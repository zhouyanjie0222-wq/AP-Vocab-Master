                { term: "Nature vs. Nurture", cn: "天性与教养", en_def: "The debate over the relative contribution of genetics vs. environment.", cn_def: "关于遗传与环境对个体发展影响相对大小的争论。", hint: "‘天生如此’还是‘后天培养’？" },
                { term: "Continuous stages of development", cn: "连续发展观", en_def: "Development as a cumulative process, gradually improving on existing skills.", cn_def: "认为发展是一个累积的过程，技能在原有基础上逐渐提高。", hint: "像树木生长，慢慢变高。" },
                { term: "Discontinuous stages of development", cn: "非连续发展观", en_def: "Development takes place in unique stages, occurring at specific times or ages.", cn_def: "认为发展是分阶段跳跃式的，在特定年龄发生质变。", hint: "像蝴蝶蜕变，从幼虫到蛹再到成虫。" },
                { term: "Longitudinal study", cn: "纵向研究", en_def: "Research in which the same people are restudied and retested over a long period.", cn_def: "在较长时间内对同一组人进行追踪研究。", hint: "跟踪同一个人从5岁到50岁。" },
                { term: "Cross-sectional study", cn: "横断面研究", en_def: "A study in which people of different ages are compared with one another.", cn_def: "在同一时间对不同年龄组的人进行比较研究。", hint: "同时找一群5岁、10岁和20岁的人来对比。" },
                { term: "Teratogens", cn: "致畸因子", en_def: "Agents (chemicals, viruses) that can harm an embryo.", cn_def: "在胚胎发育过程中能造成异常或畸形的有害物质。", hint: "酒精、药物等‘恶魔因子’。" },
                { term: "Fine motor coordination", cn: "精细动作协调", en_def: "Coordination of small muscles, in movements—usually involving the synchronization of hands and fingers.", cn_def: "小肌肉群的动作协调，通常涉及手指和手的同步。", hint: "‘绣花针功夫’。写字、扣纽扣。" },
                { term: "Gross motor coordination", cn: "粗大动作协调", en_def: "Coordination of large muscles, like arms and legs.", cn_def: "大肌肉群的协调，如手臂和腿部。", hint: "‘大开大合’。跑步、跳跃、爬行。" },
                { term: "Maturation", cn: "成熟", en_def: "Biological growth processes that enable orderly changes in behavior.", cn_def: "驱动行为有序变化的生物生长过程。", hint: "天生自带的‘发育时间表’，不受环境影响（比如几月会爬）。" },
                { term: "Rooting reflex", cn: "觅食反射", en_def: "A baby's tendency, when touched on the cheek, to turn toward the touch and open the mouth.", cn_def: "当婴儿面颊被触碰时，会自动转头并张嘴寻找乳头的反射。", hint: "生存本能，像自动寻路的雷达。" },
                { term: "Visual cliff", cn: "视觉悬崖", en_def: "A laboratory device for testing depth perception in infants.", cn_def: "用于测试婴儿深度知觉的实验室装置。", hint: "铺着格子的玻璃台，测试宝宝敢不敢爬过‘悬崖’。" },
                { term: "Critical period", cn: "关键期", en_def: "An optimal period early in life when exposure to certain stimuli produces normal development.", cn_def: "生命早期的一个最佳时期，此时接触某些刺激对正常发育至关重要。", hint: "‘过了这村没这店’。如果此时没学，后面很难补救。" },
                { term: "Sensitive period", cn: "敏感期", en_def: "A time when a particular type of development is most likely, although it may still happen later.", cn_def: "某种发展最容易发生的时期，但晚一些也有可能发生。", hint: "比关键期更灵活一些，比如学习第二语言。" },
                { term: "Imprinting", cn: "印刻", en_def: "The process by which certain animals form strong attachments during an early-life critical period.", cn_def: "某些动物在生命早期的关键期形成的强烈依恋。", hint: "刚出生的小鸭子会跟着它看到的第一个移动物体（比如劳伦兹）。" },
                { term: "Menarche", cn: "月经初潮", en_def: "The first menstrual period.", cn_def: "女性初次月经。", hint: "青春期发育的重要标志。" },
                { term: "Spermarche", cn: "精子初现", en_def: "The first ejaculation.", cn_def: "男性初次射精。", hint: "男性青春期发育的标志。" },
                { term: "Menopause", cn: "绝经/更年期", en_def: "The time of natural cessation of menstruation.", cn_def: "月经自然停止的时期。", hint: "女性生殖能力的结束。" },
                { term: "Sexual orientation", cn: "性取向", en_def: "An enduring sexual attraction toward members of one's own sex, the other sex, or both sexes.", cn_def: "对他人的持久性情感、浪漫或性吸引力。", hint: "异性恋、同性恋、双性恋等。" },
                { term: "Sensorimotor stage", cn: "感知运动阶段", en_def: "Piaget's 1st stage; babies know the world through senses and motor activities.", cn_def: "皮亚杰第一阶段（0-2岁）；婴儿通过感官和动作认识世界。", hint: "‘手口并用’。拿到什么都想抓一下、啃一口。" },
                { term: "Object permanence", cn: "客体永久性", en_def: "Awareness that things continue to exist even when not perceived.", cn_def: "意识到事物即使不在视线内也依然存在的认知能力。", hint: "如果不具备这个，藏起玩具宝宝就觉得玩具消失了。" },
                { term: "Preoperational stage", cn: "前运算阶段", en_def: "Piaget's 2nd stage; language development but no logical operations.", cn_def: "皮亚杰第二阶段（2-7岁）；有语言但缺乏逻辑运算。", hint: "有想象力，但会认为月亮也在跟着他走。" },
                { term: "Conservation", cn: "守恒意识", en_def: "Properties like volume remain the same despite changes in form.", cn_def: "明白物体的物理属性不随形态改变而改变的能力。", hint: "宽杯子和高杯子的水量其实一样。" },
                { term: "Egocentrism", cn: "自我中心", en_def: "Inability to see the world from others' perspective.", cn_def: "无法从他人的角度看世界的倾向。", hint: "‘遮住眼你就看不见我’。以为我知道的你肯定也知道。" },
                { term: "Animism", cn: "泛灵论", en_def: "Belief that inanimate objects have lifelike qualities.", cn_def: "认为无生命物体也具有生命特征的信念。", hint: "‘洋娃娃也会疼’。给小熊盖被子。" },
                { term: "Theory of Mind", cn: "心理理论", en_def: "Ability to reason about the mental states of others.", cn_def: "能够理解和推理他人内心想法、情绪和意图的能力。", hint: "开始明白‘你可能不知道我知道什么’。" },
                { term: "Concrete operational stage", cn: "具体运算阶段", en_def: "Piaget's 3rd stage; logic develops about concrete events.", cn_def: "皮亚杰第三阶段（7-11岁）；开始对具体事物进行逻辑思考。", hint: "能理解守恒了，但还不太能处理纯抽象的数学公式。" },
                { term: "Formal operational stage", cn: "形式运算阶段", en_def: "Piaget's 4th stage; abstract reasoning develops.", cn_def: "皮亚杰第四阶段（12岁以上）；发展出抽象推理能力。", hint: "能进行‘如果...那么...’的假设性思考。" },
                { term: "Scaffolding", cn: "支架式教学", en_def: "Support tailored to current skill level to help child reach next level.", cn_def: "根据孩子当前水平提供的临时支持，帮助其达到更高水平。", hint: "像建筑工地的脚手架，学会了就拆掉。" },
                { term: "Zone of proximal development", cn: "最近发展区 (ZPD)", en_def: "Gap between what a learner can do alone and with help.", cn_def: "学习者独立完成任务与在他人的帮助下完成任务之间的差距。", hint: "维果茨基提出。‘跳一跳，够得着’的那个区域。" },
                { term: "Fluid intelligence", cn: "流体智力", en_def: "Ability to reason speedily and abstractly.", cn_def: "快速进行抽象推理和解决新问题的能力。", hint: "反应速度、解谜能力。随年龄增长而下降。" },
                { term: "Crystallized intelligence", cn: "晶体智力", en_def: "Accumulated knowledge and verbal skills.", cn_def: "积累的知识、经验和语言能力。", hint: "‘资历’。随年龄增长而增加。" },
                { term: "Dementia", cn: "痴呆/失智症", en_def: "Neurocognitive disorder involving decline in mental ability severe enough to interfere with daily life.", cn_def: "涉及认知能力下降、足以干扰日常生活的神经认知障碍。", hint: "不仅是健忘，更是认知功能的全面衰退。" },
                { term: "Phoneme", cn: "音素", en_def: "Smallest distinctive sound unit in language.", cn_def: "语言中最小的区分音位的声音单位。", hint: "‘声母韵母’。/b/ /a/ /t/。" },
                { term: "Morpheme", cn: "词素", en_def: "Smallest unit that carries meaning (e.g., prefix, root).", cn_def: "语言中最小的有意义的单位。", hint: "单词的‘零件’。比如'preview'里的'pre'。" },
                { term: "Semantics", cn: "语义学", en_def: "The study of meaning in language.", cn_def: "研究语言中意义的规则。", hint: "研究‘这个词到底是什么意思’。" },
                { term: "Grammar", cn: "语法", en_def: "System of rules that enables communication.", cn_def: "使我们能够沟通的规则体系。", hint: "语言的‘交通规则’。" },
                { term: "Syntax", cn: "句法", en_def: "Set of rules for combining words into sentences.", cn_def: "在句子中组合词语的规则。", hint: "‘句子成分’。主语后面跟谓语。" },
                { term: "Cooing", cn: "咕咕声", en_def: "Early stage of language development where infant makes vowel sounds.", cn_def: "语言发展的早期阶段，婴儿发出简单的元音。", hint: "‘喔喔’‘啊啊’。" },
                { term: "Babbling", cn: "咿呀学语", en_def: "Stage starting at 4 months; infant utters various sounds.", cn_def: "4个月大的婴儿发出各种音节的声音。", hint: "‘哒哒哒’‘爸爸妈妈’（其实还没意识到意思）。" },
                { term: "One-word speech", cn: "单词语", en_def: "Stage (12 months) where child speaks mostly in single words.", cn_def: "约1岁时，主要用单个词来表达意思。", hint: "‘水’‘抱’。" },
                { term: "Telegraphic speech", cn: "电报句", en_def: "Early speech stage (2 years) child speaks in simple 2-word sentences.", cn_def: "约2岁时，使用名词+动词的简短句子。", hint: "‘要球球’‘妈妈走’。" },
                { term: "Overgeneralization (Grammar)", cn: "语法的过度泛化", en_def: "Applying a grammar rule in situations where it doesn't apply (e.g., 'I goed').", cn_def: "在不适用规则的地方强行使用语法规则。", hint: "比如把‘走了’都说成‘去过了’，虽然生硬但说明孩子在学逻辑。" },
                { term: "Ecological systems theory", cn: "生态系统理论", en_def: "Bronfenbrenner's view of development as occurring within multiple layers of environment.", cn_def: "勃朗芬布伦纳提出，发展发生在该层嵌套的环境中。", hint: "人处在同心圆中心，环境层层包围。" },
                { term: "Microsystem", cn: "微观系统", en_def: "The immediate environment of the individual (family, peers).", cn_def: "直接影响个体的环境，如家庭和同伴。", hint: "最里圈，每天打交道的人。" },
                { term: "Mesosystem", cn: "中观系统", en_def: "Connections between microsystems.", cn_def: "不同微观系统之间的联系。", hint: "比如家长和老师的关系。" },
                { term: "Exosystem", cn: "外观系统", en_def: "Environmental settings that indirectly affect the child.", cn_def: "间接影响孩子的环境设置。", hint: "比如父母的工作单位。" },
                { term: "Macrosystem", cn: "宏观系统", en_def: "The culture in which individuals live.", cn_def: "个体所处的文化背景。", hint: "法律、价值观、社会风俗。" },
                { term: "Chronosystem", cn: "时间系统", en_def: "The temporal dimension (time) of the environment.", cn_def: "环境的时间维度。", hint: "比如什么时候搬家，父母什么时候离婚。" },
                { term: "Self-concept", cn: "自我概念", en_def: "All our thoughts and feelings about ourselves, answering 'Who am I?'.", cn_def: "我们对自身的所有想法和感受。", hint: "我是个什么样的人？" },
                { term: "Authoritarian parenting style", cn: "专制型教养", en_def: "Strict rules, high control, low responsiveness.", cn_def: "严厉、高控制、低回应。", hint: "‘因为我说了算’。不讲道理，只给命令。" },
                { term: "Authoritative parenting style", cn: "权威型教养", en_def: "Demanding but responsive; sets rules but explains and listens.", cn_def: "高自控、高回应；制定规则但讲道理。", hint: "‘咱们谈谈’。最理想的教养方式。" },
                { term: "Permissive parenting style", cn: "放任型教养", en_def: "Few demands, high responsiveness, little discipline.", cn_def: "低要求、高回应、几乎没有管教。", hint: "‘你想干嘛就干嘛’。" },
                { term: "Secure attachment", cn: "安全型依恋", en_def: "Child explores happily when caregiver is present, shows distress when gone, and is easily comforted upon return.", cn_def: "照料者在时快乐探索，离开时焦虑，回来时易被安抚。", hint: "建立了健康的信任感。" },
                { term: "Insecure avoidant attachment", cn: "不安全回避型依恋", en_def: "Child ignores caregiver, shows little emotion when they leave or return.", cn_def: "疏远照料者，离开或回来时都没什么反应。", hint: "情感隔离，不再期待被安抚。" },
                { term: "Insecure anxious attachment", cn: "不安全焦虑型依恋", en_def: "Child is clingy, extremely distressed when caregiver leaves, and may be angry or hard to soothe upon return.", cn_def: "极度黏人，离开时崩溃，回来时愤怒或难以安抚。", hint: "情绪极其矛盾。" },
                { term: "Insecure disorganized attachment", cn: "不安全紊乱型依恋", en_def: "Child shows inconsistent, confused, or fearful behavior toward caregiver.", cn_def: "行为矛盾、混乱或表现出对照顾者的恐惧。", hint: "通常与虐待或严重的照料不周有关。" },
                { term: "Temperament", cn: "气质", en_def: "A person's characteristic emotional reactivity and intensity.", cn_def: "个体的生来具有的情绪反应方式和特征。", hint: "‘天生的脾气’。Easy, Difficult, or Slow-to-warm-up。" },
                { term: "Separation anxiety", cn: "分离焦虑", en_def: "Emotional distress seen in infants when they are separated from people with whom they have formed an attachment.", cn_def: "婴儿与依恋对象分开时产生的焦虑和痛苦。", hint: "妈妈一走就大哭。" },
                { term: "Adolescent egocentrism", cn: "青少年自我中心", en_def: "Inability to distinguish between one's own perception of what others think about them and what people actually think in reality.", cn_def: "错误地认为别人一直在关注和评价自己。", hint: "把自己当成世界演出的中心。" },
                { term: "Imaginary audience", cn: "虚拟观众", en_def: "Belief that everyone is watching and judging them.", cn_def: "认为所有人都在注视和评价自己的信念。", hint: "‘天哪，大家一定会嘲笑我的新发型’。" },
                { term: "Personal fable", cn: "个人寓言", en_def: "Belief that one's experiences are unique and they are invulnerable.", cn_def: "认为自己的经历不仅独特且自己是无敌/不会出事的信念。", hint: "‘这种坏事绝不会发生在我身上’。" },
                { term: "Social clock", cn: "社会钟", en_def: "Culturally preferred timing of social events such as marriage, parenthood, and retirement.", cn_def: "社会文化对于什么时候结婚、生子、退休的‘默认时间表’。", hint: "‘什么年龄该干什么事’的社会压力。" },
                { term: "Emerging adulthood", cn: "成年初显期", en_def: "A distinct period of development between adolescence and young adulthood (18-25).", cn_def: "从青少年向成年过渡的一个独特阶段（18-25岁）。", hint: "还在探索，还没完全独立定型。" },
                { term: "Trust v. Mistrust", cn: "信任对不信任", en_def: "Erikson Stage 1; needs to form a sense of trust with caregivers.", cn_def: "艾里克森第一阶段：建立基本的安全感和信任感。", hint: "生命第一年（0-1岁）。" },
                { term: "Autonomy v. Shame/Doubt", cn: "自主对羞愧", en_def: "Erikson Stage 2; toddlers learn to exercise will and do things for themselves.", cn_def: "艾里克森第二阶段：学会自理（如如厕训练）并锻炼意志。", hint: "学步期（1-3岁）。" },
                { term: "Initiative v. Guilt", cn: "主动对内疚", en_def: "Erikson Stage 3; preschoolers learn to initiate tasks and carry out plans.", cn_def: "艾里克森第三阶段：开始设定目标并执行计划。", hint: "学龄前期（3-6岁）。" },
                { term: "Industry v. Inferiority", cn: "勤奋对自卑", en_def: "Erikson Stage 4; children learn the pleasure of applying themselves to tasks.", cn_def: "艾里克森第四阶段：在学习各种技能中获得胜任感。", hint: "学龄期（6-12岁）。" },
                { term: "Identity v. Role Confusion", cn: "同一性对角色混乱", en_def: "Erikson Stage 5; teens work at refining a sense of self.", cn_def: "艾里克森第五阶段：弄清楚‘我是谁’的问题。", hint: "青少年期（12-18岁）。" },
                { term: "Intimacy v. Isolation", cn: "亲密对孤独", en_def: "Erikson Stage 6; struggle to form close relationships and to gain the capacity for intimate love.", cn_def: "艾里克森第六阶段：寻求亲密关系与爱。", hint: "成年早期（20s-40s）。" },
                { term: "Generativity v. Stagnation", cn: "繁殖对停滞", en_def: "Erikson Stage 7; discover a sense of contributing to the world (family or work).", cn_def: "艾里克森第七阶段：做出贡献，抚养后代或创造价值。", hint: "成年中期（40s-60s）。" },
                { term: "Integrity v. Despair", cn: "完善对绝望", en_def: "Erikson Stage 8; reflecting on life, feeling a sense of satisfaction or failure.", cn_def: "艾里克森第八阶段：回顾一生，感到无憾还是后悔。", hint: "成年晚期（60岁以上）。" },
                { term: "Adverse childhood experiences (ACEs)", cn: "逆境童年体验", en_def: "Potential traumatic events that occur in childhood (0-17 years).", cn_def: "童年时期发生的潜在创伤性事件。", hint: "严重影响身心发展的早期阴影。" },
                { term: "Identity statuses (Marcia)", cn: "同一性状态 (Marcia)", en_def: "Stages of identity development: Achievement, Diffusion, Foreclosure, Moratorium.", cn_def: "詹姆斯·马西亚提出的青少年身份认同的不同状态。", hint: "关于‘探索’和‘承诺’的组合。" },
                { term: "Identity Achievement", cn: "同一性达成", en_def: "Identity status after a period of exploration and active choice.", cn_def: "经过探索后，对自我同一性做出了稳定的承诺。", hint: "想清楚了，定下来了。" },
                { term: "Identity Diffusion", cn: "同一性扩散", en_def: "Status where individual has not explored or committed to an identity.", cn_def: "既不探索也不承诺，处于游离状态。", hint: "迷茫且不作为。" },
                { term: "Identity Foreclosure", cn: "同一性早闭", en_def: "Status where individual commits to an identity without exploration (often following parents).", cn_def: "未经探索就直接接受了父母或社会的建议。", hint: "‘听妈妈的话’，不做反抗。" },
                { term: "Identity Moratorium", cn: "同一性延缓", en_def: "Status where individual is in the midst of a crisis, actively exploring.", cn_def: "正处于探索危机的过程，尚未做出承诺。", hint: "‘正在寻找自我’。" }
            ],
            "Unit 4: Social Psychology & Personality": [
                // Topic 4.1 Attribution Theory and Person Perception
                { term: "Internal attribution", cn: "内部归因", en_def: "Assigning the cause of behavior to personal traits or feelings.", cn_def: "将行为原因归结为个人特质或感受。", hint: "‘他迟到是因为他这人很懒’。把原因推给人的性格。" },
                { term: "Situational attribution", cn: "情境归因", en_def: "Assigning the cause of behavior to external factors.", cn_def: "将行为原因归结为外部环境因素。", hint: "‘他迟到是因为堵车’。把原因推给外界环境。" },
                { term: "Optimistic explanatory style", cn: "乐观解释风格", en_def: "Accounting for negative events with external, unstable, and specific causes.", cn_def: "将负面事件归因于外部、不稳定且具体的原因。", hint: "‘这次没考好只是运气差，下次努力就行’。" },
                { term: "Pessimistic explanatory style", cn: "悲观解释风格", en_def: "Accounting for negative events with internal, stable, and global causes.", cn_def: "将负面事件归因于内部、稳定且全局的原因。", hint: "‘我考砸是因为我笨，我干什么都不行’。" },
                { term: "Actor/observer bias", cn: "行动者-观察者偏差", en_def: "The tendency to attribute our own behavior to situational causes and others' behavior to internal causes.", cn_def: "倾向于将自己的行为归因于情境，而将他人的行为归因于内在特质。", hint: "‘我摔跤是因为地滑（情境），你摔跤是因为你笨（内在）’。" },
                { term: "Fundamental attribution error", cn: "基本归因错误", en_def: "Overestimating internal factors and underestimating situational factors for others' behavior.", cn_def: "在解释他人行为时，高估内在因素而低估情境因素。", hint: "看到别人考试不及格，立刻觉得他不努力，而忽略了他可能生病了。" },
                { term: "Self-serving bias", cn: "自我服务偏差", en_def: "The tendency to take credit for success but blame failure on external factors.", cn_def: "成功归功于自己，失败归咎于外部的倾向。", hint: "‘考得好是因为我聪明，考不好是因为卷子太难’。" },
                { term: "Internal locus of control", cn: "内部控制点", en_def: "Belief that one controls their own fate.", cn_def: "认为自己可以控制命运的信念。", hint: "掌握自己命运的方向盘。" },
                { term: "External locus of control", cn: "外部控制点", en_def: "Belief that outside forces determine one's fate.", cn_def: "认为外部力量决定自己命运的信念。", hint: "觉得成功全靠运气或‘上天安排’。" },
                { term: "Person perception", cn: "他人知觉", en_def: "The process of forming impressions of others.", cn_def: "形成对他人的印象的过程。", hint: "如何观察和评价一个没见过面的人。" },
                { term: "Mere exposure effect", cn: "多看效应", en_def: "Developing a preference for things simply because they are familiar.", cn_def: "仅仅因为熟悉而产生好感的倾向。", hint: "‘日久生情’。歌听多了会觉得好听，人看多了会觉得顺眼。" },
                { term: "Self-fulfilling prophecy", cn: "自我实现预言", en_def: "An expectation that causes you to act in ways that make that expectation come true.", cn_def: "一种让你以促使该期望成真的方式行动的期望。", hint: "如果你预言自己今天很倒霉，你可能会真的表现得垂头丧气，从而导致倒霉的事发生。" },
                { term: "Social comparison (upward/downward)", cn: "社会比较 (上行/下行)", en_def: "Evaluating one's own abilities by comparing with others.", cn_def: "通过与他人比较来评价自己的能力。", hint: "向‘大神’看齐（上行）或向‘差生’找自信（下行）。" },
                { term: "Relative deprivation", cn: "相对剥夺感", en_def: "Perception that one is worse off relative to those with whom one compares oneself.", cn_def: "相对于比较对象而言，觉得自己处于劣势的感觉。", hint: "你涨了100块工资很高兴，但发现死对头涨了200块，你就开始不爽了。" },

                // Topic 4.2 Attitude Formation and Attitude Change
                { term: "Stereotype", cn: "刻板印象", en_def: "Generalized belief about a group of people.", cn_def: "对某一群人的泛化的、固定的概念。", hint: "‘某省的人都很能吃辣’。一种思想上的‘地图炮’。" },
                { term: "Prejudice", cn: "偏见", en_def: "Unjustifiable negative attitude toward a group.", cn_def: "对某一群体无理的、负面的态度。", hint: "一种含有情感色彩的刻有印象，通常是负面的。" },
                { term: "Discrimination (Social)", cn: "歧视", en_def: "Unjustifiable negative behavior toward a group.", cn_def: "对某一群体表现出的无理的、负向的行为。", hint: "‘偏见’是想法，‘歧视’是做出来（比如拒绝雇用某人）。" },
                { term: "Implicit attitudes", cn: "内隐态度", en_def: "Attitudes that are at the unconscious level.", cn_def: "潜意识层面的态度。", hint: "你嘴上说不在意，但行为上却不自觉地表现出排斥。可以用IAT测验出来。" },
                { term: "Just-world phenomenon", cn: "公平世界现象", en_def: "Belief that people get what they deserve.", cn_def: "相信‘好人有好报，恶有恶报’的信念。", hint: "‘他被骗肯定是活该，谁让他贪心’。给受害者贴标签来换取内心的安全感。" },
                { term: "Out-group homogeneity bias", cn: "外群体同质性偏差", en_def: "Perception that out-group members are more similar to one another than in-group members are.", cn_def: "认为外群体成员之间非常相似的倾向。", hint: "‘他们那群人都长一个样，性格也一样’。" },
                { term: "In-group bias", cn: "内群体偏差", en_def: "Tendency to favor one's own group.", cn_def: "偏袒自己所在群体的倾向。", hint: "‘我们班的人就是比隔壁班优秀’。" },
                { term: "Ethnocentrism", cn: "民族中心主义", en_def: "Belief in the superiority of one's own ethnic group.", cn_def: "认为自己民族优于其它的信念。", hint: "用自己文化的尺子去衡量全世界。" },
                { term: "Belief perseverance", cn: "信念固着", en_def: "Clinging to one's initial conceptions after they have been discredited.", cn_def: "即使原来的证据已被证伪，仍坚持原有信念的倾向。", hint: "‘我不听我不听，反正我认为是对的’。" },
                { term: "Confirmation bias", cn: "确认偏误", en_def: "Searching for information that supports preexisting beliefs.", cn_def: "倾向于寻找支持自己观点的证据。", hint: "你只会点开那些标题符合你想法的文章。" },
                { term: "Cognitive dissonance", cn: "认知失调", en_def: "Tension experienced when our beliefs and behaviors don't match.", cn_def: "当信念与行为不一致时产生的焦虑感。", hint: "为了消除紧张，你会要么改行为（不抽烟了），要么改想法（抽烟其实能提神）。费斯廷格提出。" },

                // Topic 4.3 Psychology of Social Situations
                { term: "Social norms", cn: "社会规范", en_def: "Understood rules for accepted and expected behavior.", cn_def: "社会公认的、被期望的行为准则。", hint: "比如在安静的影院里不能大声喧哗。" },
                { term: "Normative social influence", cn: "规范性社会影响", en_def: "Conforming to gain approval or avoid disapproval.", cn_def: "为了获得认可或避免排斥而产生的从众行为。", hint: "大家都买这个名牌包，我也得买一个，不然会被排挤。" },
                { term: "Informational social influence", cn: "信息性社会影响", en_def: "Conforming because we accept others' version of reality.", cn_def: "因为认为别人掌握了正确信息而产生的从众行为。", hint: "在高级西餐厅不知道该用哪把叉子，看到别人用左边的，你也用左边的。" },
                { term: "Persuasion", cn: "说服", en_def: "The process of creating, reinforcing, or changing people's beliefs or actions.", cn_def: "试图改变他人信念或行为的过程。", hint: "改变主意。" },
                { term: "Elaboration likelihood model", cn: "阐述可能性模型", en_def: "Theory of how persuasion works; via central and peripheral routes.", cn_def: "解释说服机制的理论；包含中心路径和外周路径。", hint: "看你是有脑子听（逻辑）还是没脑子听（颜值）。" },
                { term: "Central route to persuasion", cn: "中心路径说服", en_def: "Focuses on the content of the message and logical arguments.", cn_def: "关注信息内容和逻辑论点的路径。", hint: "‘这款电脑的CPU是顶级的，性能极佳’。" },
                { term: "Peripheral route to persuasion", cn: "外周路径说服", en_def: "Focuses on emotional cues or speaker attractiveness.", cn_def: "关注情绪暗示或说话者个人魅力的路径。", hint: "‘这个明星长得真帅，他代言的肯定好’。" },
                { term: "Halo effect", cn: "晕轮效应", en_def: "Overall impression of a person influences how we feel about their character.", cn_def: "对一个人的整体印象影响对其具体特质的评价。", hint: "‘长得好看的人一定也很善良’。以偏概全。" },
                { term: "Foot-in-the-door technique", cn: "登门槛技巧", en_def: "Agreement with a small request makes agreement with a larger request more likely.", cn_def: "同意了一个小请求后，更有可能同意大请求。", hint: "‘先借我1块钱坐车’ -> ‘再借我50块钱吃顿饭’。" },
                { term: "Door-in-the-face technique", cn: "留面子技巧", en_def: "Asking for a huge request first (expected refusal) leads to better agreement with a small follow-up request.", cn_def: "先提出巨大请求（被拒），再提出小请求（易被接受）。", hint: "‘先借我1000块’ (被拒) -> ‘那借我10块总行吧’ (同意)。" },
                { term: "Conformity", cn: "从众", en_def: "Adjusting behavior or thinking to coincide with a group standard.", cn_def: "改变行为或想法以向群体标准看齐。", hint: "阿希的线段实验：明明B长，但由于大家都说A长，你也说是A。" },
                { term: "Obedience", cn: "服从", en_def: "Compliance with an order or request from an authority figure.", cn_def: "服从权威者的命令。", hint: "米尔格拉姆的电击实验。‘权威感’让普通人变得残忍。" },
                { term: "Individualism", cn: "个人主义", en_def: "Priority to one's own goals over group goals.", cn_def: "更看重个人目标而非群体目标。", hint: "强调个人成就、独特性、自我实现。" },
                { term: "Collectivism", cn: "集体主义", en_def: "Priority to group goals and identity.", cn_def: "更看重群体目标和身份。", hint: "强调和谐、忠诚、集体荣誉。" },
                { term: "Multiculturalism", cn: "多元文化主义", en_def: "Presence of several distinct cultural groups within a society.", cn_def: "一个社会中存在多种不同文化群体的现象。", hint: "承认并尊重差异。" },
                { term: "Group polarization", cn: "群体极化", en_def: "Strengthening of a group's prevailing inclinations through discussion.", cn_def: "经过讨论后，群体原有的倾向变得更加极端。", hint: "一群本来就讨厌数学的人聚在一起，讨论后变得极其仇视数学。" },
                { term: "Groupthink", cn: "群体思维", en_def: "Mode of thinking that occurs when desire for harmony overrides realistic appraisal of alternatives.", cn_def: "为了维护和谐而牺牲现实评估决策的思维模式。", hint: "大家都不敢提不同意见，最后做出了极其离谱的决定（比如挑战者号事故）。" },
                { term: "Diffusion of responsibility", cn: "责任分散", en_def: "Feeling less responsible when others are present.", cn_def: "由于他人在场而感到个人责任减轻的现象。", hint: "‘这么多人在这，我不报案肯定有人报’。" },
                { term: "Social loafing", cn: "社会懈怠", en_def: "Exerting less effort when performing in a group.", cn_def: "在团队任务中比独自一人时出力更少的倾向。", hint: "‘三个和尚没水喝’。出工不出力。" },
                { term: "Deindividuation", cn: "去个性化", en_def: "Loss of self-awareness and self-restraint in group situations that foster arousal and anonymity.", cn_def: "在群体中感到由于匿名和唤醒感导致的自我约束力下降。", hint: "‘蒙面侠’效应。在暴乱中或网络喷子由于没人认得，表现出平时不敢做的残暴行为。" },
                { term: "Social facilitation", cn: "社会助长", en_def: "Improved performance on simple tasks in the presence of others.", cn_def: "由于他人在场导致简单任务表现变好。", hint: "‘人来疯’。如果是困难任务，反而可能变差（社会抑制）。" },
                { term: "False consensus effect", cn: "虚假一致性效应", en_def: "Overestimating the extent to which others share our beliefs.", cn_def: "高估别人与我们想法一致的程度。", hint: "‘我喜欢吃香菜，肯定大家都喜欢吃’。" },
                { term: "Superordinate goals", cn: "公共目标/超段目标", en_def: "Shared goals that override differences among people and require their cooperation.", cn_def: "需要合作才能完成并能化解矛盾的共同目标。", hint: "谢里夫的强盗洞穴实验：通过一起修理坏了的水车，敌对的两组男孩和好了。" },
                { term: "Social trap", cn: "社会陷阱", en_def: "Situation where conflicting parties pursue self-interest and become caught in mutually destructive behavior.", cn_def: "由于追求个人利益而导致双方共输的局面。", hint: "公地悲剧。大家都多养牛，最后草地全毁了，大家都饿死。" },
                { term: "I/O psychologist", cn: "工业/组织心理学家", en_def: "Application of psychological concepts to optimize human behavior in workplaces.", cn_def: "研究工作场所中人类行为的心理学家。", hint: "帮公司招人、提高效率、改善员工心态。" },
                { term: "Altruism", cn: "利他主义", en_def: "Unselfish regard for the welfare of others.", cn_def: "不计个人回报地关心他人福利的行为。", hint: "真正的无私奉献。" },
                { term: "Social reciprocity norm", cn: "互惠规范", en_def: "Expectation that people will help those who have helped them.", cn_def: "‘礼尚往来’。你应该帮助那个曾经帮过你的人。" },
                { term: "Social responsibility norm", cn: "社会责任规范", en_def: "Expectation that people will help those in need, even without future benefits.", cn_def: "对于弱者或需要帮助的人负有的责任感。", hint: "帮助老人过马路，并不期待回报。" },
                { term: "Bystander effect", cn: "旁观者效应", en_def: "Lower likelihood of helping when more people are present.", cn_def: "旁观者越多，个人施救可能性越低的现象。", hint: "基蒂·吉诺维斯惨案。责任分散的具体体现。" },

                // Topic 4.4 Psychodynamic and Humanistic Theories of Personality
                { term: "Psychodynamic perspective-personality", cn: "心理动力学视角", en_def: "Focuses on unconscious mind and childhood childhood experiences.", cn_def: "关注潜意识冲突和早期童年经历对人格的影响。", hint: "弗洛伊德是祖师爷。" },
                { term: "Unconscious (Freud)", cn: "无意识/潜意识", en_def: "A reservoir of inaccessible, mostly unacceptable thoughts and feelings.", cn_def: "一个巨大的、通常无法察觉的本能冲动和被压抑记忆的仓库。", hint: "大脑里的冰山下层。决定了你的性格底色。" },
                { term: "Denial", cn: "否认", en_def: "Refusing to believe distressing realities.", cn_def: "拒绝承认显而易见的痛苦现实。", hint: "‘他不爱我？不可能，他只是太忙了’。" },
                { term: "Displacement", cn: "替代/位移", en_def: "Shifting impulses toward a more acceptable or less threatening object.", cn_def: "将冲动转移到更弱或更安全的替代品上。", hint: "老板骂了我，我回家骂老婆，老婆骂孩子，孩子踢猫。" },
                { term: "Projection (Defense)", cn: "投射", en_def: "Attributing one's own threatening impulses to others.", cn_def: "把自己内心无法接受的冲动强加给别人。", hint: "明明是我讨厌你，我却说：‘我觉得你在讨厌我’。" },
                { term: "Rationalization", cn: "合理化", en_def: "Offering self-justifying explanations in place of real, more threatening reasons.", cn_def: "找借口。用虚假的、能被社会接受的理由代替真实理由。", hint: "‘我没考好是因为那天教室太热’（其实是没复习）。‘酸葡萄心理’。" },
                { term: "Reaction formation", cn: "反应形成", en_def: "Switching unacceptable impulses into their opposites.", cn_def: "表现得与你内心真实想法完全相反。", hint: "明明很讨厌这个老师，却对他表现得极其热情和恭敬。" },
                { term: "Regression", cn: "退行", en_def: "Retreating to a more infantile stage of development.", cn_def: "在压力下表现出像更小孩子一样的行为。", hint: "由于弟弟出生，已经学会走路的哥哥开始要求妈妈抱。" },
                { term: "Repression", cn: "压抑", en_def: "Banishment of anxiety-arousing thoughts from consciousness.", cn_def: "将痛苦的念头强行推入潜意识里不愿去想。", hint: "这是所有防御机制的基础。就像把妖怪关进地牢。" },
                { term: "Sublimation", cn: "升华", en_def: "Transforming unacceptable impulses into socially valued motivation.", cn_def: "将原始本能转化为积极、高尚的社会成就。", hint: "一个人有暴力冲动，结果成了拳击冠军或外科医生。" },
                { term: "Projective tests", cn: "投射测验", en_def: "Personality test designed to let a person respond to ambiguous stimuli, revealing hidden emotions and internal conflicts (e.g., Rorschach).", cn_def: "一种人格测验，通过让受测者面对模糊刺激（如墨迹图）来揭示其内心深处的冲突。", hint: "墨迹图测验：‘你看到了什么？’ 罗夏墨迹测验。" },
                { term: "Humanistic psychology", cn: "人本主义心理学", en_def: "Focused on human potential and self-actualization.", cn_def: "关注人类潜能、自我实现和人的价值。", hint: "马斯洛和罗杰斯。研究‘健康的、快乐的人’是如何发展的。" },
                { term: "Unconditional positive regard", cn: "无条件积极关注", en_def: "Caring, nonjudgmental attitude towards another person.", cn_def: "对他人表现出全然的接纳和关怀，不带评价。", hint: "父母对孩子：‘无论你变得怎样，我都依然爱你’。罗杰斯提出。" },
                { term: "Self-actualizing tendency", cn: "自我实现倾向", en_def: "Motivation to fulfill one's potential.", cn_def: "实现个人潜能、充分发挥才华的内在驱动力。", hint: "位于马斯洛需求塔的尖端。" },

                // Topic 4.5: Social-Cognitive and Trait Theories of Personality
                { term: "Social-cognitive perspective–personality", cn: "社会认知视角", en_def: "Personal traits and social context interact to produce behavior.", cn_def: "认为人格特质、行为和社会环境的相互作用决定了人的表现。", hint: "班杜拉提出。你在家和在学校可能是完全不同的样子。" },
                { term: "Reciprocal determinism", cn: "交互决定论", en_def: "The interacting influences of behavior, internal cognition, and environment.", cn_def: "行为、认知和环境三者之间互为因果的影响关系。", hint: "我爱笑（人格）-> 大家都对我笑（环境）-> 我更开心地社交（行为）。" },
                { term: "Self-efficacy", cn: "自我效能感", en_def: "One's sense of competence on a task.", cn_def: "对于自己能否成功完成某项任务的信念。", hint: "‘我相信我行’。高自我效能的人更容易成功。不同于自尊。" },
                { term: "Self-concept (Unit 4)", cn: "自我概念", en_def: "All our thoughts and feelings about ourselves.", cn_def: "我是谁？对自己的整体评价。", hint: "在人格理论里非常重要。" },
                { term: "Self-esteem", cn: "自尊", en_def: "One's feelings of high or low self-worth.", cn_def: "一个人对自身价值的评价感。", hint: "觉得自己活得有尊严、值不值钱。" },
                { term: "Trait view on personality", cn: "人格特质观", en_def: "Explains personality in terms of stable, enduring character patterns.", cn_def: "用稳定的、持久的性格模式来解释人格。", hint: "关注人‘现在到底是什么样’。比如‘他很外向’。" },
                { term: "Big Five Theory", cn: "大五人格理论", en_def: "The five broad dimensions of personality (OCEAN).", cn_def: "现代人格心理学中最被认可的模型：OCEAN。", hint: "Openness, Conscientiousness, Extraversion, Agreeableness, Neuroticism。" },
                { term: "Openness (Big Five)", cn: "开放性", en_def: "Openness to new experiences and ideas.", cn_def: "对新体验、想象力和好奇心的程度。", hint: "喜欢尝试新餐厅、新思维。高分者很有创意。" },
                { term: "Conscientiousness (Big Five)", cn: "尽责性", en_def: "Self-discipline, organization, and achievement-striving.", cn_def: "有计划、细心、自律、负责任的程度。", hint: "‘学霸特质’。高分者做事有条不紊。" },
                { term: "Extraversion (Big Five)", cn: "外向性", en_def: "Sociability, energy, and outgoing nature.", cn_def: "社交、充满活力、健谈的程度。", hint: "‘社牛’。" },
                { term: "Agreeableness (Big Five)", cn: "宜人性", en_def: "Cooperative, compassionate, and trustworthy nature.", cn_def: "同情心、合作精神、信任他人的程度。", hint: "老好人。" },
                { term: "Emotional stability (Neuroticism)", cn: "情绪稳定性/神经质", en_def: "Neuroticism is the degree of emotional instability (anxiety, moodiness).", cn_def: "经历负向情绪（如焦虑、波动）的倾向。", hint: "低分者很淡定；高分者容易焦虑、多愁善感。" },
                { term: "Personality inventories", cn: "人格问卷", en_def: "Self-report surveys (like MMPI).", cn_def: "自我报告式的性格问卷。", hint: "一套长长的问卷让你打分。比投射测验更客观。" },
                { term: "Factor analysis", cn: "因素分析", en_def: "Statistical method used to find underlying patterns (traits) in data.", cn_def: "用于在大堆数据中找到隐藏模式（核心特质）的统计方法。", hint: "‘大数据降维打击’。把各种性格词语归类成几大核心特质。" },

                // Topic 4.6 Motivation
                { term: "Drive-reduction theory", cn: "驱力还原理论", en_def: "Physiological needs create a drive that motivates an organism to satisfy the need.", cn_def: "生理需求产生心理上的‘驱力’，促使生物去减少这种张力。", hint: "渴了（需求）-> 感到焦躁（驱力）-> 喝水 -> 舒服了（还原）。" },
                { term: "Homeostasis", cn: "内稳态", en_def: "Maintenance of a steady internal state.", cn_def: "维持内部平衡。生物钟的平衡点。", hint: "身体的‘温控系统’。太热就出汗，太冷就打冷战。" },
                { term: "Arousal theory", cn: "觉醒理论", en_def: "Motivation to reach an optimal level of excitement.", cn_def: "追求最佳兴奋水平的动机理论。", hint: "太无聊时你想找点刺激，太紧张时你想冷静。" },
                { term: "Optimal arousal", cn: "最佳觉醒水平", en_def: "The level of arousal at which person's performance is maximized.", cn_def: "表现达到巅峰时的兴奋程度。", hint: "‘心流’产生的土壤。" },
                { term: "Yerkes-Dodson Law", cn: "耶基斯-多德森定律", en_def: "Performance increases with arousal only up to a point, beyond which it decreases.", cn_def: "表现在兴奋度适中时达到最好。倒U型曲线。", hint: "太闲没干劲，太压力会崩溃。做简单题可以兴奋点，做难题要冷静点。" },
                { term: "Self-determination theory", cn: "自我决定理论", en_def: "Motivations based on autonomy, competence, and relatedness.", cn_def: "关注人类天生具备的三种心理需求：自主权、胜任感和归属感。", hint: "如果你觉得自己能决定、干得好、有人爱，你就动力十足。" },
                { term: "Intrinsic motivation", cn: "内部动机", en_def: "Doing something because you enjoy it.", cn_def: "因为热爱和兴趣而去做的动力。", hint: "学习是因为喜欢，不是为了成绩。" },
                { term: "Extrinsic motivation", cn: "外部动机", en_def: "Doing something for a reward or to avoid punishment.", cn_def: "为了拿奖励、赚大钱、不被骂而做的动力。", hint: "为钱打工。" },
                { term: "Incentive theory", cn: "激励理论", en_def: "Environmental stimuli that 'pull' us toward behaviors.", cn_def: "外部诱惑（如金钱、美食）吸引我们去行动。", hint: "‘甜萝卜大棒’。外部拉力。" },
                { term: "Instincts", cn: "本能", en_def: "Fixed, unlearned patterns of behavior throughout a species.", cn_def: "全物种通用的、非学习而来的、固定的行为模式。", hint: "三文鱼洄游、婴儿吸吮。不是所有行为都能叫本能，必须天生就有。" },
                { term: "Approach-approach conflict", cn: "双趋冲突", en_def: "Choosing between two attractive options.", cn_def: "在两个都想要的选项中选一个。", hint: "‘鱼和熊掌不可兼得’。去吃火锅还是去吃日料？" },
                { term: "Approach-avoidance conflict", cn: "趋避冲突", en_def: "Goal has both positive and negative qualities.", cn_def: "同一目标既有吸引力又有排斥力。", hint: "‘又爱又恨’。想吃火锅（好），但怕胖（坏）。" },
                { term: "Avoidance-avoidance conflict", cn: "双避冲突", en_def: "Choosing between two unattractive options.", cn_def: "在两个都不想要的选项中选一个。", hint: "‘前有狼后有虎’。去写作业还是去洗碗？" },
                { term: "Sensation seeking theory", cn: "感觉寻求理论", en_def: "Tendency to seek out varied, novel, complex, and intense sensations.", cn_def: "寻找多样化、新奇、复杂且强烈的感官体验的倾向。", hint: "寻找刺激的人。" },
                { term: "Experience seeking", cn: "经验寻求", en_def: "Seeking new mental or internal experiences.", cn_def: "由于感官、思想、生活方式而追求新奇异的体验。", hint: "旅游、读怪书、尝试奇特的视角。" },
                { term: "Thrill or adventure seeking", cn: "惊险与冒险寻求", en_def: "Willingness to take risks through physical adventure.", cn_def: "愿意通过高风险的体育活动追求刺激。", hint: "蹦极、跳伞。" },
                { term: "Disinhibition", cn: "去抑制", en_def: "Seeking stimulation through social and sexual disinhibition.", cn_def: "通过社交行为上的放纵来寻求刺激。", hint: "‘放飞自我’。在派对上玩得很嗨。" },
                { term: "Boredom susceptibility", cn: "对枯燥的敏感性", en_def: "Aversion to repetition and monotonous tasks.", cn_def: "极度讨厌重复和无聊的任务。", hint: "‘哪怕只要坐着我就受不了’。" },
                { term: "Eating motivation", cn: "进食动机", en_def: "Why we feel hungry and when we eat.", cn_def: "胃如何指挥人大脑感觉到饿、饱的机制。", hint: "下丘脑的功劳。" },
                { term: "Ghrelin", cn: "饥饿素", en_def: "Hormone secreted by empty stomach; sends 'I'm hungry' signals to the brain.", cn_def: "胃部分泌的激素；大脑收到：‘我饿了！’", hint: "‘肚子叫’的主力军。" },
                { term: "Leptin", cn: "瘦素", en_def: "Protein hormone secreted by fat cells; tells brain to decrease hunger.", cn_def: "脂肪细胞分泌的蛋白质激素；大脑收到：‘别吃了，饱了！’", hint: "控制食欲的刹车。" },
                { term: "Pituitary gland (Unit 4)", cn: "垂体 (Unit 4)", en_def: "Master gland controlled by the hypothalamus.", cn_def: "下丘脑控制的‘主腺体’。", hint: "它给各种激素下指令，包括饥饿管理相关。" },

                // Topic 4.7 Emotion
                { term: "Affect (emotion)", cn: "情感/情绪", en_def: "A feeling or mood characterized by physical arousal and cognitive interpretation.", cn_def: "一种包含生理反应、主观感受和认知评价的心理状态。", hint: "主观的心情波动。" },
                { term: "Facial-feedback hypothesis", cn: "面部反馈假设", en_def: "Facial expressions can influence our emotions.", cn_def: "你的面部表情能反过来影响你的情绪。", hint: "‘强颜欢笑’。如果你假装笑一下，大脑可能会觉得自己变高兴了点。" },
                { term: "Broaden-and-build theory", cn: "扩展-建构理论", en_def: "Positive emotions broaden outlook and help build lasting personal resources.", cn_def: "积极情绪能拓宽视野，并帮你积累持久的心理资源。", hint: "‘爱笑的女孩运气不会差’。心情好时你更容易学习和交友。芭芭拉·弗雷德里克森提出。" },
                { term: "Display rules", cn: "表情规则", en_def: "Cultural rules for how and when to show emotions.", cn_def: "文化中关于在何时、何地、向谁展示情绪的潜规则。", hint: "比如在正式场合要控制笑容。" }
            ],
            "Unit 5: Mental & Physical Health": [
                // Topic 5.1 Introduction to Health Psychology
                { term: "Health psychology", cn: "健康心理学", en_def: "Subfield that provides psychology's contribution to behavioral medicine.", cn_def: "心理学的一个分支，研究心理和行为如何影响身体健康。", hint: "研究‘心’与‘身’的互动。" },
                { term: "Eustress", cn: "良性压力", en_def: "A positive stress that energizes a person and helps them reach a goal.", cn_def: "能激发能量、帮助实现目标的积极压力。", hint: "比如考试前适度的紧张让你发挥更好。" },
                { term: "Distress", cn: "劣性压力/苦恼", en_def: "A negative stress that can make a person sick or can keep a person from reaching a goal.", cn_def: "产生消极影响、可能致病或阻碍目标实现的压力。", hint: "让你感到崩溃、透支的压力。" },
                { term: "Adverse childhood experiences (ACEs) (Unit 5)", cn: "逆境童年体验", en_def: "Traumatic events in childhood linked to long-term health problems.", cn_def: "童年时期的创伤，可能导致成年后长期的身心健康问题。", hint: "早年的‘健康定时炸弹’。" },
                { term: "General Adaptation Syndrome (GAS)", cn: "一般适应综合征", en_def: "Selye's concept of the body's adaptive response to stress in three phases: alarm, resistance, exhaustion.", cn_def: "身体应对压力的三阶段反应：警觉、抵抗、耗竭。", hint: "ARE (Alarm, Resistance, Exhaustion)。最后阶段最危险，容易生病。" },
                { term: "Fight-flight-freeze response", cn: "战斗-逃跑-冻结反应", en_def: "Body's automatic response to a perceived threat.", cn_def: "身体面对威胁时的自动防御反应。", hint: "要么打，要么跑，要么原地装死。" },
                { term: "Tend and befriend theory", cn: "抚慰与结盟理论", en_def: "Under stress, people (especially women) often provide support to others and bond with and seek support from others.", cn_def: "面对压力时，倾向于照顾他人并寻求社会联结的策略。", hint: "‘抱团取暖’。女性在压力下常有的反应。" },
                { term: "Problem-focused coping", cn: "问题聚焦应对", en_def: "Attempting to alleviate stress directly by changing the stressor.", cn_def: "直接改变压力源来减轻压力。", hint: "‘解决事情’。如果作业多，就立刻制定计划写完。" },
                { term: "Emotion-focused coping", cn: "情绪聚焦应对", en_def: "Attempting to alleviate stress by avoiding or ignoring a stressor and attending to emotional needs.", cn_def: "通过回避压力源或处理自身情绪需求来减轻压力。", hint: "‘处理心情’。如果压力大，就去找朋友倾诉或看电影放松，而不直接去解决那个难题。" },

                // Topic 5.2: Positive Psychology
                { term: "Positive psychology (Unit 5)", cn: "积极心理学", en_def: "The scientific study of human flourishing and strengths.", cn_def: "研究人类繁荣、幸福和力量的科学。", hint: "创始人赛里格曼。研究怎么让人活得更好，而不只是治病。" },
                { term: "Subjective well-being", cn: "主观幸福感", en_def: "Self-perceived happiness or satisfaction with life.", cn_def: "个体主观感受到的快乐和对生活的满意度。", hint: "你自己觉得自己幸福吗？" },
                { term: "Wisdom", cn: "智慧", en_def: "Expert knowledge about the practical aspects of life.", cn_def: "关于生活实际层面的专业知识和判断力。", hint: "积极心理学核心美德之一。深思熟虑。" },
                { term: "Courage", cn: "勇气", en_def: "Emotional strengths that involve the exercise of will to accomplish goals.", cn_def: "涉及行使意志力以克服困难、克服恐惧的力量。", hint: "积极心理学核心美德之一。" },
                { term: "Humanity", cn: "人性/仁慈", en_def: "Interpersonal strengths that involve tending and befriending others.", cn_def: "涉及关心和照料他人的心理力量。", hint: "爱与同情心。" },
                { term: "Temperance", cn: "节制", en_def: "Strengths that protect against excess.", cn_def: "防止过度、保持适度的力量。", hint: "宽恕、谦逊、自律。" },
                { term: "Transcendence", cn: "超越", en_def: "Strengths that forge connections to the larger universe and provide meaning.", cn_def: "建立与更广阔世界的联系并提供意义的力量。", hint: "对美的欣赏、希望、信仰。" },

                // Topic 5.3 Explaining and Classifying Psychological Disorders
                { term: "DSM-5", cn: "精神疾病诊断与统计手册 (第5版)", en_def: "The American Psychiatric Association's system for diagnosing psychological disorders.", cn_def: "目前最常用的诊断心理障碍的‘字典’标准。", hint: "‘心理疾病的说明书’。只描述症状，不解释原因。" },
                { term: "ICD-11", cn: "国际疾病分类 (第11版)", en_def: "The WHO's International Classification of Diseases; includes mental disorders.", cn_def: "世界卫生组织发布的疾病分类系统，包含精神障碍。", hint: "全球通用的医疗诊断标准。" },
                { term: "Behavioral perspective (Disorders)", cn: "行为学视角", en_def: "Absence of reinforcement or abnormal learning as cause of disorders.", cn_def: "认为心理障碍源于错误的学习和缺乏强化。", hint: "重点在‘行为是被学会的’。" },
                { term: "Psychodynamic perspective (Disorders)", cn: "心理动力学视角", en_def: "Unconscious conflicts and childhood experiences as cause of disorders.", cn_def: "认为障碍源于潜意识冲突和童年阴影。", hint: "‘挖掘过去’。弗洛伊德派。" },
                { term: "Humanistic perspective (Disorders)", cn: "人本主义视角", en_def: "Failure to strive toward self-actualization as cause of disorders.", cn_def: "认为障碍源于自我实现受阻或缺乏无条件接纳。", hint: "‘追求潜力’阶段出了问题。" },
                { term: "Cognitive perspective (Disorders)", cn: "认知视角", en_def: "Irrational or maladaptive thought patterns as cause of disorders.", cn_def: "认为障碍源于非理性或错误的思维方式。", hint: "‘想法决定心情’。如果你总往坏处想，就会抑郁。" },
                { term: "Evolutionary perspective (Disorders)", cn: "进化视角", en_def: "Examines if symptoms like anxiety were once adaptive.", cn_def: "认为某些障碍可能是古代适应环境残留下来的特征。", hint: "‘这种焦虑在古代能救命’。" },
                { term: "Sociocultural perspective (Disorders)", cn: "社会文化视角", en_def: "Roles, expectations, and culture as cause of disorders.", cn_def: "认为社会压力、期望和文化环境导致了障碍。", hint: "某种疾病可能只在特定国家流行。" },
                { term: "Biological perspective (Disorders)", cn: "生物学视角", en_def: "Genetics, brain chemistry, and brain structure as cause of disorders.", cn_def: "认为障碍源于基因、脑化学物质失衡或脑结构异常。", hint: "‘零件坏了’。重点在生化反馈。" },
                { term: "Biopsychosocial perspective (Disorders)", cn: "生物心理社会视角", en_def: "Integrated approach viewing disorders as a combination of multiple factors.", cn_def: "认为障碍由生物、心理和社会因素共同作用产生。", hint: "‘全景分析’。目前最科学的综合模型。" },
                { term: "Diathesis-stress model", cn: "素质-压力模型", en_def: "Suggests that a genetic predisposition (diathesis) and environmental stress combine to cause a disorder.", cn_def: "认为个体具备遗传易感性，在压力诱发下才会发病。", hint: "‘基因上膛，环境扣动扳机’。" },

                // Topic 5.4 Selection of Categories of Psychological Disorders
                { term: "ADHD", cn: "注意缺陷多动障碍", en_def: "Condition including attention difficulty, hyperactivity, and impulsiveness.", cn_def: "包含注意力集中困难、活动过度和冲动。多发于儿童期。", hint: "多动症。" },
                { term: "Autism spectrum disorder (ASD)", cn: "孤独症谱系障碍", en_def: "Disorder appearing in childhood marked by deficient communication and social interaction.", cn_def: "以社交和沟通障碍及受限的重复行为为特征的障碍。", hint: "自闭症谱系。" },
                { term: "Schizophrenic spectrum disorder", cn: "精神分裂症谱系障碍", en_def: "Group of disorders characterized by delusions, hallucinations, and disorganized speech.", cn_def: "以思维、情感和知觉扭曲（如妄想、幻觉）为特征的障碍。", hint: "‘现实感丧失’。核心特征：幻觉和妄想。" },
                { term: "Positive symptoms", cn: "阳性症状", en_def: "Inappropriate behaviors are present (e.g., hallucinations).", cn_def: "大脑中多出来的、不正常的反应。", hint: "‘多出来的赘肉’。比如幻听、妄想。" },
                { term: "Negative symptoms", cn: "阴性症状", en_def: "Appropriate behaviors are absent (e.g., flat affect).", cn_def: "大脑里缺少的、正常的反应。", hint: "‘缺失的功能’。比如面无表情、不爱说话。" },
                { term: "Hallucinations", cn: "幻觉", en_def: "False sensory experiences.", cn_def: "没有外部刺激却产生的感官体验。", hint: "‘看见/听到不存在的东西’。幻听最常见。" },
                { term: "Delusions", cn: "妄想", en_def: "False beliefs maintained despite contrary evidence.", cn_def: "坚信不疑的错误信念。", hint: "‘固执的错误想法’。不是感觉，是思想。" },
                { term: "Delusions of grandeur", cn: "夸大妄想", en_def: "Belief that one is famous, powerful, or supernatural.", cn_def: "认为自己拥有至高无上的权力、财富或神力的妄想。", hint: "‘我觉得我是玉皇大帝’。" },
                { term: "Delusions of paranoia", cn: "被害妄想", en_def: "Belief that others are plotting against them.", cn_def: "认为有人在监视、谋害或迫害自己的妄想。", hint: "‘总有刁民想害朕’。" },
                { term: "Disorganized thinking", cn: "思维混乱", en_def: "Fragmented, bizarre, or distorted thoughts.", cn_def: "破碎、怪异或扭曲的思想过程。", hint: "说话逻辑断裂。" },
                { term: "Word salad", cn: "词语杂拌", en_def: "Jumbled ideas within sentences.", cn_def: "句子中毫无关联的词语胡乱堆砌。", hint: "即便每个词都懂，连在一起却像外星语。" },
                { term: "Catatonic stupor", cn: "紧张性木僵", en_def: "Remaining motionless for hours and then becoming agitated.", cn_def: "长时间保持一个姿势一动不动。", hint: "像雕像一样，对外界完全没反应。" },
                { term: "Flat affect", cn: "情感平淡", en_def: "A lack of emotional responsiveness.", cn_def: "完全没有表情或情感起伏。", hint: "‘面具脸’。听到极好或极坏消息都一个表情。" },
                { term: "Major depressive disorder", cn: "重度抑郁障碍", en_def: "Disorder characterized by at least two weeks of depressed mood and loss of interest.", cn_def: "持续两周以上的极度抑郁和对所有事物失去兴趣。", hint: "‘感冒之王’。不仅是难过，更是‘活着的动力消失了’。" },
                { term: "Persistent depressive disorder", cn: "持续性抑郁障碍 (恶劣心境)", en_def: "A chronically low mood that lasts for at least two years.", cn_def: "程度比重郁轻，但持续时间极长（两年以上）的低落情绪。", hint: "‘长期的灰暗色调’。" },
                { term: "Bipolar I", cn: "双相障碍 I 型", en_def: "Alternation between deep depression and extreme mania.", cn_def: "在重度抑郁和极度狂躁之间剧烈摆动。", hint: "情绪的高峰和谷底。狂躁发作很明显。" },
                { term: "Bipolar II", cn: "双相障碍 II 型", en_def: "Alternation between deep depression and hypomania.", cn_def: "重度抑郁与‘轻躁狂’交替。", hint: "相比I型，狂躁程度较轻，但抑郁同样沉重。" },
                { term: "Manic episode", cn: "狂躁发作", en_def: "Hyperactive, wildly optimistic state with little need for sleep.", cn_def: "极度兴奋、乐观、不切实际、不需要睡觉的状态。", hint: "‘超人模式’。疯狂花钱或做决定。" },
                { term: "Hypomanic episode", cn: "轻躁狂发作", en_def: "Less extreme manic phase.", cn_def: "程度较轻的狂躁。", hint: "表现为效率极高、精力充沛，但没到失控程度。" },
                { term: "Phobia", cn: "恐惧症", en_def: "Persistent, irrational fear of a specific object or situation.", cn_def: "对特定物体或情境持续、非理性的恐惧。", hint: "比如怕蜘蛛、怕打雷。一定要‘非理性’且‘干扰生活’。" },
                { term: "Agoraphobia", cn: "广场恐惧症", en_def: "Fear of situations where escape might be difficult.", cn_def: "害怕身处这种难以逃脱或得不到帮助的开放公共场。合", hint: "不敢出门，不敢去人多的地方。" },
                { term: "Panic disorder", cn: "惊恐障碍", en_def: "Characterized by recurrent, unexpected panic attacks.", cn_def: "反复发作、突如其来的强烈恐惧感（惊恐发作）。", hint: "感觉死神降临、心跳快到爆炸、呼吸困难。" },
                { term: "Ataque de nervios", cn: "神经发作 (文化绑定)", en_def: "Cultural syndrome (Latin American) involving screaming, trembling, and dissociation in response to stress.", cn_def: "拉丁文化中一种应对重大压力的爆发性反应。", hint: "‘心碎的狂喊’。展示了心理障碍的文化特异性。" },
                { term: "Social anxiety disorder", cn: "社交焦虑障碍", en_def: "Intense fear of social situations, leading to avoidance.", cn_def: "对社交情境的极度恐惧，担心被审视或出丑。", hint: "极其严重的‘社恐’。" },
                { term: "Taijin Kyofusho", cn: "对人恐怖症 (文化绑定)", en_def: "Cultural syndrome (Japanese) fear of offending or embarrassing others with one's body/expression.", cn_def: "日本文化中一种担心自己的言行、气味、眼神伤害或尴尬他人的恐惧。", hint: "西方社恐怕自己被审视，太人恐怖症怕自己影响别人。" },
                { term: "OCD", cn: "强迫症", en_def: "Disorder characterized by unwanted repetitive thoughts (obsessions) and actions (compulsions).", cn_def: "以反复出现的痛苦念头（强迫思维）和刻板行为（强迫行为）为特征。", hint: "明知无意义但停不下来。" },
                { term: "Obsessions", cn: "强迫思维", en_def: "Repetitive thoughts (e.g., concerns about germs).", cn_def: "反复出现的、闯入性的痛苦想法。", hint: "脑子里停不下来的‘脏、不安全’的念头。" },
                { term: "Compulsions", cn: "强迫行为", en_def: "Repetitive behaviors (e.g., excessive hand washing).", cn_def: "为了减轻强迫思维带来的焦虑而重复做的动作。", hint: "洗手50次、反复锁门。" },
                { term: "Hoarding disorder", cn: "囤积障碍", en_def: "Difficulty discarding possessions, leading to clutter.", cn_def: "极度难以丢弃物品，即使无用，导致生活空间被堆满。", hint: "‘垃圾山屋主’。" },
                { term: "Dissociative disorders", cn: "分离性障碍", en_def: "Disorders where conscious awareness becomes separated from previous memories and feelings.", cn_def: "意识与过去的记忆或人格发生脱离或崩解。", hint: "‘灵魂出窍’或‘自我断裂’感。" },
                { term: "Dissociative Identity Disorder (DID)", cn: "分离性身份障碍", en_def: "RARE disorder in which a person exhibits two or more distinct and alternating personalities.", cn_def: "极罕见障碍，一个人表现出两个或多个截然不同且交替的人格。", hint: "‘多重人格’。" },
                { term: "Dissociative amnesia", cn: "分离性遗忘症", en_def: "Inability to recall important personal information, usually of a stressful nature.", cn_def: "无法回忆起重要的个人信息，通常与重大压力有关。", hint: "由于创伤而选择性‘忘记’了自己是谁或发生了什么。" },
                { term: "Dissociative fugue", cn: "分离性漫游", en_def: "Sudden travel and replacement of identity, often following trauma.", cn_def: "在遗忘自己身份的同时，突然离家漫游并可能建立新身份。", hint: "‘逃离并变身’。醒来发现自己在千里之外成了另一个人。" },
                { term: "Post-traumatic stress disorder (PTSD)", cn: "创伤后应激障碍", en_def: "Disorder characterized by haunting memories, nightmares, and social withdrawal after a traumatic event.", cn_def: "重大创伤后出现的闪回、梦魇和情感麻木。", hint: "‘记忆的牢笼’。" },
                { term: "Anorexia nervosa", cn: "神经性厌食症", en_def: "Eating disorder characterized by self-starvation and excessive weight loss.", cn_def: "由于极度恐惧发胖而拒绝进食，导致体重严重不足。", hint: "‘饿死也要瘦’。即使已经皮包骨，照镜子仍觉得自己胖。" },
                { term: "Bulimia nervosa", cn: "神经性贪食症", en_def: "Eating disorder characterized by binge eating followed by purging.", cn_def: "暴饮暴食后通过催吐、吃泻药等方式清除食物。", hint: "‘大吃大吐’。体重通常维持在正常范围，所以更隐蔽。" },
                { term: "Paranoid personality disorder", cn: "偏执型人格障碍", en_def: "Pattern of distrust and suspiciousness of others.", cn_def: "对他人持久怀疑、不信任的人格模式。", hint: "‘所有人都在针对我’，且固执己见。" },
                { term: "Schizoid personality disorder", cn: "分裂样人格障碍", en_def: "Detachment from social relationships and restricted range of emotional expression.", cn_def: "情感极度冷漠，对社交和人机关系毫无兴趣。", hint: "‘真正的孤独者’。不是害怕社交，而是根本不在乎。" },
                { term: "Schizotypal personality disorder", cn: "分裂型人格障碍", en_def: "Acute discomfort in close relationships, cognitive distortions, and eccentricities of behavior.", cn_def: "社交不适，且伴有怪异的想法（如迷信、幻觉）和行为。", hint: "‘怪人’。思维跳跃且古怪。" },
                { term: "Antisocial personality disorder", cn: "反社会型人格障碍", en_def: "Lack of conscience for wrongdoing even toward friends and family.", cn_def: "缺乏良知，漠视他人权利，常有欺诈或暴力行为。", hint: "‘冷血动物’。与社会规范对抗。注意与‘社恐’完全不同。" },
                { term: "Histrionic personality disorder", cn: "表演型人格障碍", en_def: "Excessive emotionality and attention-seeking.", cn_def: "极度需要成为注意力中心，情感表达夸张且肤浅。", hint: "‘戏精’。如果不关注他，他就受不了。" },
                { term: "Narcissistic personality disorder", cn: "自恋型人格障碍", en_def: "Grandiosity, need for admiration, and lack of empathy.", cn_def: "夸大的自我感，极度需要赞美，且缺乏共情能力。", hint: "‘我是最完美的’。不仅自信，更是把别人当工具。" },
                { term: "Borderline personality disorder (BPD)", cn: "边缘型人格障碍", en_def: "Instability of interpersonal relationships, self-image, and affect.", cn_def: "情绪、人际关系和自我形象的极度不稳定。", hint: "‘爱恨就在一瞬间’。极其害怕被抛弃。" },
                { term: "Avoidant personality disorder", cn: "回避型人格障碍", en_def: "Social inhibition, feelings of inadequacy, and hypersensitivity to negative evaluation.", cn_def: "通过极端回避来保护自己免受拒绝和批评。", hint: "因为太敏感、太怕被拒绝所以干脆躲起来。" },
                { term: "Dependent personality disorder", cn: "依赖型人格障碍", en_def: "Excessive need to be taken care of, leading to submissive behavior.", cn_def: "过分需要被照顾，表现出顺从和死缠烂打。", hint: "‘巨婴’人格。无法独立做决定。" },
                { term: "Obsessive-compulsive personality disorder (OCPD)", cn: "强迫型人格障碍", en_def: "Preoccupation with orderliness, perfectionism, and control.", cn_def: "对秩序、完美和控制的极度痴迷。", hint: "不是强迫症（没有具体的思维/行为循环），而是一贯的‘完美主义强迫型性格’。" },

                // Topic 5.5 Treatment of Psychological Disorders
                { term: "Therapeutic alliance", cn: "治疗联盟", en_def: "Bond of trust and mutual understanding between a therapist and client.", cn_def: "治疗师与求助者之间建立的信任和互相理解的关系。", hint: "‘治疗的基础’。关系越好，效果越好。" },
                { term: "Cultural humility", cn: "文化谦逊", en_def: "Ability to maintain an interpersonal stance that is other-oriented in relation to cultural identity.", cn_def: "承认自己在他人文化背景方面的局限性，并持开放、尊重的态度。", hint: "治疗师不把自己当成对方文化的专家。" },
                { term: "Deinstitutionalization", cn: "去机构化", en_def: "Transferring psychiatric patients from large hospitals to community-based care.", cn_def: "将精神病患者从大型封闭医院转移到社区康复机构的过程。", hint: "让病人回归社会。" },
                { term: "Decentralized treatment", cn: "分散式治疗", en_def: "Community-based treatment programs.", cn_def: "在社区或就近地点提供的治疗服务。", hint: "更方便、更人性化。" },
                { term: "Ethical principles: Nonmaleficence", cn: "伦理原则：不伤害", en_def: "Duty to do no harm.", cn_def: "治疗的第一原则：不给求助者造成额外伤害。", hint: "首要任务。" },
                { term: "Ethical principles: Fidelity", cn: "伦理原则：忠诚", en_def: "Being faithful and committed to current service.", cn_def: "对工作的忠诚和对合约、承诺的遵守。", hint: "建立信任的基石。" },
                { term: "Ethical principles: Integrity", cn: "伦理原则：正真/诚实", en_def: "Professional honesty and accuracy.", cn_def: "保持专业的诚实和准确性。", hint: "不欺骗求助者。" },
                { term: "Ethical principles: Respect for rights and dignity", cn: "伦理原则：尊重权利与尊严", en_def: "Acknowledging self-determination and privacy.", cn_def: "尊重求助者的隐私权和自我决定权。", hint: "比如保密原则。" },
                { term: "Psychodynamic therapy", cn: "心理动力学疗法", en_def: "Therapy deriving from the psychoanalytic tradition.", cn_def: "基于经典精神分析传统，探索潜意识和过去的疗法。", hint: "现在的精神分析。" },
                { term: "Free association", cn: "自由联想", en_def: "Technique where the patient says whatever comes to mind.", cn_def: "让求助者毫无保留地说出脑子里出现的任何念头。", hint: "‘意识流’爆破潜意识。" },
                { term: "Dream interpretation", cn: "梦的解析", en_def: "Analyzing the manifest (visible) and latent (hidden) content of dreams.", cn_def: "分析梦的显性内容和隐性含义。", hint: "梦是通往潜意识的‘王道’。" },
                { term: "Cognitive restructuring", cn: "认知重构", en_def: "Process of learning to identify and dispute irrational or maladaptive thoughts.", cn_def: "识别并挑战求助者非理性想法的过程。", hint: "‘换个思路看问题’。改变负面逻辑。" },
                { term: "Fear hierarchies", cn: "恐惧等级", en_def: "A list of situations that evoke anxiety, ordered from least to most stressful.", cn_def: "将恐惧的情况按严重程度从低到高排列的清单。", hint: "系统脱敏法的一步：‘从怕看蜘蛛图片开始到摸蜘蛛’。" },
                { term: "Cognitive triad (Beck)", cn: "认知三联征", en_def: "The negative view of self, world, and future.", cn_def: "贝克发现的抑郁症核心负面视角：对自己、世界和未来的悲观。" },
                { term: "Applied behavior analysis (ABA)", cn: "应用行为分析", en_def: "Use of specific techniques based on learning principles to change behavior.", cn_def: "基于学习原理（如强化）来改变行为的技术，常用于孤独症治疗。", hint: "重点在‘行为改变’。" },
                { term: "Exposure therapies", cn: "暴露疗法", en_def: "Treating anxieties by exposing people to the things they fear.", cn_def: "让求助者直面恐惧对象的疗法。", hint: "‘以毒攻毒’。包含系统脱敏和洪水法。" },
                { term: "Systematic desensitization", cn: "系统脱敏法", en_def: "Type of exposure therapy that associates a pleasant relaxed state with gradually increasing anxiety-triggering stimuli.", cn_def: "在放松状态下，逐步接触恐惧等级中的对象的方法。", hint: "‘温水煮青蛙’式战胜恐惧。" },
                { term: "Aversion therapy", cn: "厌恶疗法", en_def: "Associating an unpleasant state with an unwanted behavior.", cn_def: "将痛苦体验与想要戒掉的行为（如酗酒）联系起来的方法。", hint: "‘喝酒就想吐’。" },
                { term: "Token economy", cn: "代币制", en_def: "Operant conditioning procedure rewarding desired behavior with a token.", cn_def: "对良好行为予以代币奖励，代币可兑换实物。", hint: "‘攒小红花’。常用于机构中。" },
                { term: "Biofeedback", cn: "生物反馈", en_def: "Using electronic monitoring of a normal body function to train someone to acquire voluntary control of that function.", cn_def: "利用电子设备显示身体指标（如心率），训练个体自主控制这些指标。", hint: "‘用意念控制心跳’。" },
                { term: "Dialectical behavior therapy (DBT)", cn: "辩证行为疗法", en_def: "Form of therapy, especially for BPD, mixing cognitive, behavioral, and mindfulness.", cn_def: "为边缘型人格障碍设计的，结合了认知行为和正念的疗法。", hint: "强调‘接纳’与‘改变’的平衡。" },
                { term: "Rational-emotive behavior therapy (REBT)", cn: "合理情绪行为疗法 (ABC模型)", en_def: "Confrontational cognitive therapy that vigorously challenges irrational beliefs.", cn_def: "埃利斯提出，通过猛烈挑战非理性信念来改变情绪。", hint: "‘怼’你的错误想法。" },
                { term: "Humanistic therapy", cn: "人本主义疗法", en_def: "Focuses on removing obstacles to self-actualization.", cn_def: "关注消除自我实现的障碍。", hint: "‘非指令式’治疗。" },
                { term: "Person-centered therapy", cn: "个人中心疗法", en_def: "Rogers' therapy featuring active listening and unconditional positive regard.", cn_def: "罗杰斯的疗法。强调同理心和无条件的爱。", hint: "让求助者在被接纳的环境中自愈。" },
                { term: "Active listening", cn: "积极倾听", en_def: "Empathic listening where listener echoes, restates, clarifies.", cn_def: "带有共情地重复、重述和澄清对方的话，以示理解。", hint: "‘像镜子一样反射’。" },
                { term: "Unconditional positive regard (Unit 5)", cn: "无条件积极关注", en_def: "Showing non-judgmental acceptance.", cn_def: "全然接纳求助者的现状。", hint: "人本主义的核心。" },
                { term: "Hypnosis in therapy", cn: "催眠治疗", en_def: "Technique involving suggestions during a state of focus.", cn_def: "在高度专注状态下使用暗示来帮助个体。", hint: "虽然有争议，但可用于戒瘾或止痛。" },
                { term: "Antidepressants", cn: "抗抑郁药", en_def: "Drugs used to treat depression (e.g., SSRIs).", cn_def: "用于治疗抑郁症的药物，如百忧解。", hint: "调高血清素水平。" },
                { term: "Antianxiety", cn: "抗焦虑药", en_def: "Drugs used to control anxiety and agitation (e.g., Xanax).", cn_def: "用于控制焦虑和不安的药物，如阿普唑仑。", hint: "抑制中枢神经活动。" },
                { term: "Lithium", cn: "锂盐", en_def: "Mood stabilizer used for bipolar disorder.", cn_def: "用于双相障碍（躁郁症）的情绪稳定剂。", hint: "‘情绪平滑剂’。能有效预防狂躁和抑郁。" },
                { term: "Antipsychotics", cn: "抗精神病药", en_def: "Drugs used to treat schizophrenia and other severe thought disorders.", cn_def: "用于治疗精神分裂症幻觉、妄想等症状的药物。", hint: "调低多巴胺水平。" },
                { term: "Tardive dyskinesia", cn: "迟发性运动障碍", en_def: "Involuntary movements of facial muscles, a side effect of long-term use of antipsychotic drugs.", cn_def: "长期服用抗精神病药导致的脸部肌肉不自主抽动。", hint: "抗精神病药的严重副作用。" },
                { term: "Lesioning (Therapy)", cn: "脑毁损", en_def: "Removal or destruction of brain tissue to treat mental disorders.", cn_def: "通过破坏特定脑组织来治疗严重心理障碍。", hint: "极其少见的极端手段。" },
                { term: "Lobotomy", cn: "前脑叶切断术", en_def: "A now-rare psychosurgical procedure once used to calm uncontrollably emotional patients.", cn_def: "切断前额叶与情绪中心联系的历史性手段。", hint: "‘僵尸手术’。现已被弃用，因为会把人变成行尸走肉。" },
                { term: "Transcranial magnetic stimulation (TMS)", cn: "经颅磁刺激", en_def: "Use of magnetic pulses to stimulate brain activity.", cn_def: "利用磁脉冲刺激大脑特定区域，用于治疗难治性抑郁。", hint: "非侵入性的、比电击更温和的物理手段。" },
                { term: "Electroconvulsive therapy (ECT)", cn: "电抽搐疗法", en_def: "Brief electric current is sent through the brain of an anesthetized patient.", cn_def: "在全麻状态下通过微弱电流诱发大脑抽搐。", hint: "‘电击疗法’。对自杀倾向极强的重度抑郁症非常有效。" }
            ]
        };

        function App() {
            const [selectedUnit, setSelectedUnit] = useState("Unit 0: Science Practices");
            const [cards, setCards] = useState(RAW_DATA["Unit 0: Science Practices"]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isRevealed, setIsRevealed] = useState(false);
            const [isHintRevealed, setIsHintRevealed] = useState(false);
            const [isShuffle, setIsShuffle] = useState(false);
            const [knownCards, setKnownCards] = useState(new Set());
            const [view, setView] = useState('practice');
            const [inputValue, setInputValue] = useState('');
            const [timerTime, setTimerTime] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            
            const timerRef = useRef(null);
            
            useEffect(() => {
                setCards(RAW_DATA[selectedUnit] || []);
                setCurrentIndex(0);
                setIsRevealed(false);
                setIsHintRevealed(false);
            }, [selectedUnit]);

            useEffect(() => { lucide.createIcons(); }, [view, isRevealed, currentIndex, knownCards.size, isHintRevealed, selectedUnit, showSuccess]);
            useEffect(() => { if (isTimerRunning) timerRef.current = setInterval(() => setTimerTime(v => v + 1), 1000); else clearInterval(timerRef.current); return () => clearInterval(timerRef.current); }, [isTimerRunning]);

            const currentCard = cards[currentIndex] || { term: "End of Unit", cn: "本单元结束", en_def: "", cn_def: "", hint: "" };
            const progress = ((currentIndex + 1) / cards.length) * 100;

            const handleNext = () => { if (currentIndex < cards.length - 1) { setCurrentIndex(v => v + 1); setIsRevealed(false); setIsHintRevealed(false); } };
            const handlePrev = () => { if (currentIndex > 0) { setCurrentIndex(v => v - 1); setIsRevealed(false); setIsHintRevealed(false); } };
            const toggleShuffle = () => { setIsShuffle(!isShuffle); setCards(prev => !isShuffle ? [...prev].sort(() => Math.random() - 0.5) : RAW_DATA[selectedUnit]); setCurrentIndex(0); };
            const toggleKnown = () => { 
                const n = new Set(knownCards); 
                const key = `${selectedUnit}-${currentIndex}`; 
                if (!n.has(key)) {
                    n.add(key); 
                    setKnownCards(n);
                    setShowSuccess(true);
                    setTimeout(() => {
                        setShowSuccess(false);
                        handleNext();
                    }, 600);
                } else {
                    n.delete(key);
                    setKnownCards(n);
                }
            };

            return (
                <div id="main-container" className="min-h-screen p-4 md:p-8 flex flex-col">
                    <div className="max-w-[1200px] w-full mx-auto grid grid-cols-1 lg:grid-cols-[280px_1fr_280px] lg:grid-rows-[80px_1fr_100px] gap-6 flex-1">
                        
                        {/* --- Header --- */}
                        <header className="lg:col-span-3 bento-item flex-row justify-between h-20 items-center px-8 border-b-4 border-indigo-100">
                             <div className="flex items-center gap-4">
                                <div className="h-10 w-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-black">AP</div>
                                <div><h1 className="text-xl font-black text-gray-900 leading-none">Vocab Master</h1><p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mt-1">Classroom Edition</p></div>
                             </div>
                             
                             <div className="flex items-center gap-6">
                                <select 
                                    className="px-4 py-2 bg-gray-50 border-2 border-gray-100 rounded-xl text-sm font-bold shadow-sm outline-none cursor-pointer hover:border-indigo-300 transition-colors"
                                    value={selectedUnit}
                                    onChange={(e) => setSelectedUnit(e.target.value)}
                                >
                                    {Object.keys(RAW_DATA).map(unit => <option key={unit} value={unit}>{unit}</option>)}
                                </select>
                                <div className="bg-black text-[#10B981] px-4 py-2 rounded-full font-mono text-xl font-bold shadow-inner border border-gray-800">
                                    {Math.floor(timerTime/60).toString().padStart(2,'0')}:{(timerTime%60).toString().padStart(2,'0')}
                                </div>
                                <button onClick={() => setView(view === 'practice' ? 'teacher' : 'practice')} className="p-2 text-gray-400 hover:text-indigo-600 transition-colors"><i data-lucide={view === 'practice' ? 'settings' : 'book-open'}></i></button>
                             </div>
                        </header>

                        {view === 'practice' ? (
                            <React.Fragment>
                                {/* --- Left: Progress --- */}
                                <aside className="space-y-4">
                                    <div className="bento-item p-6 text-center group active:scale-95">
                                        <div className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2">Unit Progress</div>
                                        <div className="text-4xl font-black text-gray-900">{currentIndex + 1} / {cards.length}</div>
                                        <div className="w-full bg-gray-100 h-2 rounded-full mt-4 overflow-hidden"><div className="h-full bg-indigo-600 transition-all duration-500" style={{width: `${progress}%`}}></div></div>
                                    </div>
                                    <div className="bento-item p-6 text-center">
                                        <div className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1">Knowledge Metre</div>
                                        <div className="text-3xl font-black text-gray-900">{Math.round((Array.from(knownCards).filter(k => k.startsWith(selectedUnit)).length / (cards.length || 1)) * 100)}%</div>
                                    </div>
                                    <button 
                                        onClick={() => setIsTimerRunning(!isTimerRunning)} 
                                        className={`w-full bento-item py-4 font-black uppercase text-xs tracking-widest transition-all ${isTimerRunning ? 'bg-red-50 text-red-600 border-2 border-red-100' : 'bg-emerald-50 text-emerald-600 border-2 border-emerald-100'}`}
                                    >
                                        {isTimerRunning ? 'Pause Session' : 'Resume Session'}
                                    </button>
                                </aside>

                                {/* --- Main: Flashcard --- */}
                                <main 
                                    className="bento-item p-12 text-center cursor-pointer relative overflow-hidden flex items-center justify-center min-h-[400px] border-4 border-transparent hover:border-indigo-100 active:scale-[0.99]"
                                    onClick={() => { if(!showSuccess) setIsRevealed(!isRevealed); }}
                                >
                                    {/* Success Overlay */}
                                    <AnimatePresence>
                                        {showSuccess && (
                                            <motion.div 
                                                initial={{ opacity: 0 }}
                                                animate={{ opacity: 1 }}
                                                exit={{ opacity: 0 }}
                                                className="absolute inset-0 bg-emerald-500/20 backdrop-blur-[2px] flex items-center justify-center z-20"
                                            >
                                                <motion.div
                                                    initial={{ scale: 0.5, opacity: 0 }}
                                                    animate={{ scale: 1, opacity: 1 }}
                                                    exit={{ scale: 1.5, opacity: 0 }}
                                                    className="bg-white rounded-full p-4 shadow-xl"
                                                >
                                                    <i data-lucide="check-circle-2" className="h-16 w-16 text-emerald-500"></i>
                                                </motion.div>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>

                                    <AnimatePresence mode="wait">
                                        {!isRevealed ? (
                                            <motion.div 
                                                key="term"
                                                initial={{ opacity: 0, y: 15 }}
                                                animate={{ opacity: 1, y: 0 }}
                                                exit={{ opacity: 0, y: -15 }}
                                                transition={{ duration: 0.25 }}
                                                className="flex flex-col items-center"
                                            >
                                                <span className="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-4 block">Term Display</span>
                                                <h2 className="text-6xl font-black text-gray-900 tracking-tight leading-tight">{currentCard.term}</h2>
                                            </motion.div>
                                        ) : (
                                            <motion.div 
                                                key="def"
                                                initial={{ opacity: 0, y: 15 }}
                                                animate={{ opacity: 1, y: 0 }}
                                                exit={{ opacity: 0, y: -15 }}
                                                transition={{ duration: 0.25 }}
                                                className="w-full max-w-[80%] flex flex-col items-center"
                                            >
                                                <h3 className="text-4xl font-black text-indigo-600 mb-6">{currentCard.cn}</h3>
                                                <div className="pt-8 border-t-4 border-gray-50 space-y-6 w-full">
                                                    <p className="text-xl font-semibold text-gray-700 leading-relaxed">{currentCard.en_def}</p>
                                                    <p className="text-lg text-gray-400 italic font-medium">{currentCard.cn_def}</p>
                                                </div>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>
                                    <div className="absolute bottom-6 left-6 text-[10px] font-black text-gray-300 uppercase">Click or Space to Reveal</div>
                                </main>

                                {/* --- Right: Hint --- */}
                                <aside className="flex flex-col gap-4">
                                    <div className="bento-item flex-1 p-6 flex flex-col text-center">
                                        <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6 border-b pb-2">Teacher's Hint</span>
                                        <div className="flex-1 flex flex-col items-center justify-center p-4 bg-indigo-50/50 rounded-3xl border-2 border-dashed border-indigo-100">
                                            <AnimatePresence mode="wait">
                                                {isHintRevealed ? (
                                                    <motion.div 
                                                        key="hint"
                                                        initial={{ opacity: 0, scale: 0.95 }}
                                                        animate={{ opacity: 1, scale: 1 }}
                                                        exit={{ opacity: 0, scale: 0.95 }}
                                                        className="font-bold text-indigo-900 leading-relaxed text-lg italic"
                                                    >
                                                        "{currentCard.hint}"
                                                    </motion.div>
                                                ) : (
                                                    <motion.button 
                                                        key="hint-btn"
                                                        initial={{ opacity: 0 }}
                                                        animate={{ opacity: 1 }}
                                                        exit={{ opacity: 0 }}
                                                        onClick={(e) => {e.stopPropagation(); setIsHintRevealed(true);}}
                                                        className="group flex flex-col items-center gap-4 text-indigo-300"
                                                    >
                                                        <div className="h-16 w-16 rounded-full bg-white shadow-sm flex items-center justify-center group-hover:scale-110 group-hover:text-indigo-600 transition-all"><i data-lucide="help-circle" className="h-8 w-8"></i></div>
                                                        <span className="text-xs font-black uppercase tracking-widest">Show Clue</span>
                                                    </motion.button>
                                                )}
                                            </AnimatePresence>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={(e) => {e.stopPropagation(); if(!showSuccess) toggleKnown();}}
                                        disabled={showSuccess}
                                        className={`bento-item py-4 font-black transition-all uppercase text-xs tracking-widest border-2 ${showSuccess || knownCards.has(`${selectedUnit}-${currentIndex}`) ? 'bg-emerald-600 text-white border-emerald-400' : 'bg-gray-50 text-gray-400 border-gray-100 hover:text-gray-900'}`}
                                    >
                                        {showSuccess || knownCards.has(`${selectedUnit}-${currentIndex}`) ? 'Added to Knowledge' : 'Got it?'}
                                    </button>
                                </aside>

                                {/* --- Footer --- */}
                                <footer className="lg:col-span-3 bento-item flex-row h-24 items-center px-8 bg-gray-900 text-white justify-between">
                                     <button onClick={handlePrev} disabled={currentIndex === 0} className="flex items-center gap-3 px-8 py-3 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 disabled:opacity-20 transition-all"><i data-lucide="arrow-left"></i> Previous</button>
                                     <div className="flex items-center gap-4">
                                        <button onClick={toggleShuffle} className={`h-12 w-12 rounded-full flex items-center justify-center transition-all ${isShuffle ? 'bg-indigo-600' : 'bg-gray-800 hover:bg-gray-700'}`}><i data-lucide="shuffle" className="h-4 w-4"></i></button>
                                        <span className="text-[10px] text-gray-500 font-bold uppercase tracking-widest px-4 border-l border-r border-gray-800">Space for Reveal</span>
                                     </div>
                                     <button onClick={handleNext} disabled={currentIndex === cards.length - 1} className="flex items-center gap-3 bg-indigo-600 px-10 py-3 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-indigo-900/40 hover:-translate-y-1 active:translate-y-0 disabled:opacity-20 transition-all">Next Card <i data-lucide="arrow-right"></i></button>
                                </footer>
                            </React.Fragment>
                        ) : (
                            <main className="lg:col-span-3 bento-item p-12 space-y-8 min-h-[500px]">
                                <h1 className="text-4xl font-black">Content Management</h1>
                                <p className="text-gray-400">Paste your custom vocab list below. Format: <code className="bg-gray-100 px-2 py-1 rounded">term | cn | en_def | cn_def | hint</code></p>
                                <textarea className="w-full flex-1 p-8 bg-gray-50 border-2 rounded-[32px] font-mono text-sm outline-none focus:border-indigo-500 shadow-inner" placeholder="Enter terms here..." value={inputValue} onChange={(e) => setInputValue(e.target.value)}></textarea>
                                <div className="flex gap-4"><button onClick={() => { const lines = inputValue.split('\n').filter(l => l.trim().includes('|')); const n = lines.map(l => { const p = l.split('|').map(s=>s.trim()); return {term:p[0], cn:p[1], en_def:p[2], cn_def:p[3], hint:p[4]}; }); if (n.length) { RAW_DATA["Custom Deck"] = n; setSelectedUnit("Custom Deck"); setView('practice'); } }} className="flex-1 py-5 bg-indigo-600 text-white rounded-3xl font-black uppercase tracking-widest shadow-lg shadow-indigo-200">Engage Custom List</button><button onClick={() => setView('practice')} className="px-12 py-5 bg-gray-100 rounded-3xl font-black uppercase tracking-widest text-gray-400">Cancel</button></div>
                            </main>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); document.querySelector('main')?.click(); } if (e.code === 'ArrowRight') document.querySelector('footer button:last-child')?.click(); if (e.code === 'ArrowLeft') document.querySelector('footer button:first-child')?.click(); });
    </script>
</body>
</html>

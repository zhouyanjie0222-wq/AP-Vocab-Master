<body class="selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const RAW_DATA = {
            "Unit 0: Science Practices": [
                // Practice 1: Apply psychological perspectives, theorists, concepts and research findings
                { term: "Cultural norms", cn: "文化规范", en_def: "Rules for accepted and expected behavior in a culture.", cn_def: "一个文化中公认的、被期望的行为准则。", hint: "‘社会潜规则’。比如在某些国家打招呼要亲吻面颊。" },
                { term: "Confirmation bias", cn: "确认偏误", en_def: "Tendency to search for information that supports our preconceptions.", cn_def: "倾向于寻找支持我们预断的信息。", hint: "你只看你想看的。算法总是让你看到你‘本来就同意’的内容。" },
                { term: "Hindsight bias", cn: "事后聪明偏见", en_def: "Tendency to believe, after learning an outcome, that one would have foreseen it.", cn_def: "得知结果后认为自己早就能预见到的倾向。", hint: "‘事后诸葛亮’。考试结果出来拍大腿：我就知道选C！" },
                { term: "Overconfidence", cn: "过度自信", en_def: "Tendency to be more confident than correct.", cn_def: "倾向于高估自己判断的准确性。", hint: "‘谜之自信’。觉得自己能10分钟写完作业，结果写了一小时。" },

                // Practice 2: Evaluate qualitative and quantitative research methods and study design
                { term: "Experiment", cn: "实验法", en_def: "A research method where variables are manipulated to determine cause and effect.", cn_def: "通过操纵变量来确定因果关系的研究方法。", hint: "‘因果之王’。唯一能确定‘谁导致了谁’的方法。" },
                { term: "Random assignment", cn: "随机分配", en_def: "Assigning participants to groups by chance to minimize preexisting differences.", cn_def: "通过随机方式将参与者分配到实验组和对照组以减少干扰因素。", hint: "‘消除不公’。像扣排队洗牌一样分发人员，保证两组人起步水平一样。" },
                { term: "Case study (non-experimental)", cn: "个案研究", en_def: "In-depth study of one individual or small group.", cn_def: "对一个人或极少数群体进行深入研究的非实验技术。", hint: "‘显微镜下的样本’。虽然不能推广到大众，但能发现极其罕见的现象。" },
                { term: "Correlation (non-experimental)", cn: "相关研究", en_def: "Measure of the extent to which two variables change together.", cn_def: "测量两个变量之间变化的一致程度。", hint: "‘如影随形’。身高和体重通常一起变，但身高不‘导致’体重（不是因果）。" },
                { term: "Meta-analysis (non-experimental)", cn: "元分析", en_def: "Statistical procedure for combining results from many studies.", cn_def: "汇总并分析许多研究结果的统计程序。", hint: "‘大数据的总结汇报’。把几十个关于同一主题的小实验合在一起看大趋势。" },

                { term: "Hypothesis", cn: "假设", en_def: "A testable prediction, often implied by a theory.", cn_def: "一个可验证的预测，通常由理论推导而来。", hint: "‘我猜...’。科学实验的出发点。" },
                { term: "Falsifiable", cn: "可证伪性", en_def: "The possibility that an idea can be proven wrong.", cn_def: "一个观点存在被证明是错误的可能性。", hint: "科学的标志。如果一个说法怎么解释都对，那它就不是科学。" },
                { term: "Operational definitions", cn: "操作性定义", en_def: "A carefully worded statement of the exact procedures used in a research study.", cn_def: "定义研究变量所使用的明确、可复刻的程序说明。", hint: "‘具体的衡量尺子’。比如把‘幸福’定义为‘一天笑几次’。" },
                { term: "Independent variable (IV)", cn: "自变量", en_def: "The variable that is manipulated by the researcher.", cn_def: "由研究者操纵的实验变量。", hint: "‘原因/改变因素’。比如实验里给不给喝咖啡，‘喝咖啡’就是自变量。" },
                { term: "Dependent variable (DV)", cn: "因变量", en_def: "The variable that is measured; it may change in response to manipulations of the IV.", cn_def: "被测量的变量，它随自变量的变化而变化。", hint: "‘结果/表现’。喝了咖啡后的‘考试成绩’就是因变量。" },
                { term: "Confounding variables", cn: "混淆变量/干扰变量", en_def: "A factor other than the IV that might produce an effect in an experiment.", cn_def: "除自变量外，可能对实验结果产生影响的其他因素。", hint: "‘捣乱变量’。比如测咖啡对考试的影响，结果发现有人昨晚熬夜了，‘熬夜’就是混淆变量。" },
                { term: "Sample", cn: "样本", en_def: "A relatively small group of people involved in a study.", cn_def: "参与研究的一小部分人。", hint: "大海里的‘一勺水’。" },
                { term: "Population", cn: "总体", en_def: "The entire group from which samples may be drawn.", cn_def: "样本所属的、你想要了解的整个群体。", hint: "比如你想研究全国的中学生，‘全国中学生’就是总体。" },
                { term: "Representative sample", cn: "代表性样本", en_def: "A sample that reflects the characteristics of the population.", cn_def: "能真实反映总体特征的样本。", hint: "不能只在这一所学校抽样，而要涵盖各个地区和类型的学生。" },
                { term: "Random sampling", cn: "随机抽样", en_def: "A sample that fairly represents a population because each member has an equal chance of inclusion.", cn_def: "每个人都有相等机会被抽中的抽样方法。", hint: "‘公平摇号’。为了选出有代表性的样本。" },
                { term: "Convenience sampling", cn: "方便抽样", en_def: "Choosing a sample because they are easy to access.", cn_def: "因为方便（如就在身边）而选择样本的方法。", hint: "在大街上随便拉个人填问卷。虽然省事，但不一定有代表性。" },
                { term: "Sampling bias", cn: "抽样偏差", en_def: "A flawed sampling process that produces an unrepresentative sample.", cn_def: "导致样本无法代表总体的有缺陷的抽样过程。", hint: "比如你想研究国民运动习惯，结果只在健身房门口发问卷。" },
                { term: "Generalizability", cn: "概括性/普适性", en_def: "The extent to which findings can be applied to the larger population.", cn_def: "实验结论能否推广到更广泛人群的程度。", hint: "如果只研究了大学生，那么结论可能不适用于中老年人。" },
                { term: "Experimental group", cn: "实验组", en_def: "The group exposed to the treatment (IV).", cn_def: "接受实验处理（自变量）的那组人。", hint: "‘被灌咖啡的那组’。" },
                { term: "Control group", cn: "控制组/对照组", en_def: "The group not exposed to the treatment; used for comparison.", cn_def: "不接受处理、作为比较基准的那组人。", hint: "‘喝白开水的那组’。" },
                { term: "Placebo", cn: "安慰剂", en_def: "An inert substance given to the control group instead of the actual drug.", cn_def: "一种没有实际疗效的、用来欺骗大脑的‘假药’。", hint: "‘面粉丸子’。" },
                { term: "Single-blind", cn: "单盲实验", en_def: "Participants do not know whether they are in the experimental or control group.", cn_def: "参与者不知道自己在哪一组。", hint: "防止‘心理作用’干扰结果。" },
                { term: "Double-blind", cn: "双盲实验", en_def: "Neither the participants nor the researchers know who is in which group.", cn_def: "参与者和研究员都不知道分组情况。", hint: "防止参与者和实验者的偏见同时干扰结果。" },
                { term: "Social desirability bias", cn: "社会赞许性偏差", en_def: "Tendency of participants to answer in a way that will be viewed favorably by others.", cn_def: "参与者倾向于给出‘别人觉得正确’或‘高尚’的答案。", hint: "‘面子问题’。比如问你一天看多久书，你可能会多报一点。" },
                { term: "Qualitative (structured interviews)", cn: "质性研究 (结构化访谈)", en_def: "Research focusing on descriptive data rather than numbers.", cn_def: "侧重于描述性文字、深层含义而非数字的研究。", hint: "‘听故事’。了解人的真实感受和想法。" },
                { term: "Quantitative (Likert scales)", cn: "量化研究 (利克特量表)", en_def: "Research focusing on numerical data.", cn_def: "侧重于数字、数据和统计的研究。", hint: "‘打分’。1-5分代表你有多同意。" },
                { term: "Peer review", cn: "同行评审", en_def: "Evaluation of scientific work by others in the same field.", cn_def: "由同领域的其他专家对科学论文进行审核的过程。", hint: "‘专家质检’。" },
                { term: "Replication", cn: "复刻/可重复性", en_def: "Repeating the essence of a research study to see whether the basic finding extends to other participants and circumstances.", cn_def: "重复进行同一研究以验证其结论是否稳定的过程。", hint: "科学的生命力。如果别人做不出来你那个结果，那就是‘玄学’。" },

                { term: "Directionality problem (correlation)", cn: "方向性问题", en_def: "Unknown if A causes B or B causes A in a correlation.", cn_def: "相关中无法确定是A影响了B，还是B影响了A。", hint: "‘鸡生蛋还是蛋生鸡’。比如自尊和成绩相关，是好成绩提高了自尊，还是高自尊带来了好成绩？" },
                { term: "Third variable problem (correlation)", cn: "第三变量问题", en_def: "Unseen factor (C) might cause both A and B in a correlation.", cn_def: "可能存在一个看不见的因素C，同时导致了A和B的变化。", hint: "比如吃雪糕和溺水事故成正相关，但其实是‘天热’（变量C）导致了这两者都变多。" },
                { term: "Survey technique", cn: "调查法", en_def: "A technique for ascertaining the self-reported attitudes or behaviors of a particular group.", cn_def: "通过问卷等方式获取特定人群自我报告的态度或行为的技术。", hint: "‘发传单问卷’。容易受到用词诱导。" },
                { term: "Self-report bias", cn: "自我报告偏差", en_def: "When participants provide inaccurate info on surveys.", cn_def: "参与者在调查中提供不准确信息的倾向。", hint: "可能由于记忆模糊或社会认同压力。" },

                { term: "Institutional review (IRB)", cn: "机构审查委员会", en_def: "A committee that reviews research proposals for ethical violations.", cn_def: "审查研究方案是否符合伦理规范的小组。", hint: "‘伦理监察员’。在动工前必须通过他们的点头。" },
                { term: "Informed consent", cn: "知情同意", en_def: "Participants must be told enough to enable them to choose whether they wish to participate.", cn_def: "参与者在了解研究大概内容后，自愿签署同意书。", hint: "‘丑话说在前头’。" },
                { term: "Informed assent", cn: "知情赞同", en_def: "The agreement of someone not able to give legal consent (e.g., a minor).", cn_def: "不能签署法律同意书的人（如未成年人）表达出的口头或书面同意。", hint: "虽然家长签了，但也要问问小孩子愿不愿意。" },
                { term: "Protection from harm", cn: "免受伤害", en_def: "Researchers must ensure participants are not at risk of physical or psychological distress.", cn_def: "研究者必须确保参与者不承受过度的身体或心理压力。", hint: "安全第一。" },
                { term: "Confidentiality", cn: "保密性", en_def: "Keeping participant information private.", cn_def: "保护参与者个人隐私不外泄。", hint: "不能把你填的问卷告诉别人。" },
                { term: "Deception", cn: "欺骗", en_def: "Misleading participants about the true purpose of a study.", cn_def: "在告知真相会干扰实验时，对参与者隐瞒真实目的。", hint: "‘善意的谎言’。但事后必须解释清楚（debriefing）。" },
                { term: "Research confederates", cn: "实验助手/共谋者", en_def: "People Who seem like participants but are actually part of the research team.", cn_def: "看起来像普通参与者，实际上是演员、是研究团队一员的人。", hint: "‘托儿’。比如阿希实验里故意报错线段的人。" },
                { term: "Debriefing", cn: "事后说明", en_def: "The post-experimental explanation of a study, including its purpose and any deceptions, to its participants.", cn_def: "实验结束后，向参与者说明其真实目的（及任何欺骗行为）的过程。", hint: "‘坦白交代’。" },

                // Practice 3: Evaluate representations of psychological concepts in quantitative and qualitative research
                { term: "Mean (Unit 0)", cn: "平均数", en_def: "Arithmetic average.", cn_def: "所有数据相加除以个数。", hint: "中心趋势之一。容易被极端值‘带节奏’。" },
                { term: "Median (Unit 0)", cn: "中位数", en_def: "Middle score.", cn_def: "按大小排序后最中间的那个数。", hint: "中心趋势之一。比较稳健，不受极端值影响。" },
                { term: "Mode", cn: "众数", en_def: "The most frequently occurring score(s).", cn_def: "出现频率最高的数据。", hint: "中心趋势之一。" },
                { term: "Range", cn: "全距/极差", en_def: "The difference between the highest and lowest scores.", cn_def: "最高分与最低分之差。", hint: "最简单的变异性测量。" },
                { term: "Normal curve", cn: "正态分布曲线", en_def: "A symmetrical, bell-shaped curve describing the distribution of many types of data.", cn_def: "对称的钟形曲线。描述了智力等大多数人类特性的分布。", hint: "‘钟形图’。大部分人都在中间，两头极少。" },
                { term: "Variation", cn: "变异性", en_def: "How spread out or clustered data is.", cn_def: "数据分散或集中的程度。", hint: "描述数据的分布广度。" },
                { term: "Skewness", cn: "偏态", en_def: "Lack of symmetry in the distribution curve.", cn_def: "分布曲线不对称的现象。", hint: "‘数据歪了’。长尾巴在右边叫正偏态，在左边叫负偏态。" },
                { term: "Bimodal distribution", cn: "双峰分布", en_def: "A distribution with two clear peaks.", cn_def: "有两个频率高峰的分布情况。", hint: "‘双峰骆驼’。说明数据里可能包含两个完全不同的群体。" },
                { term: "Standard deviation (Unit 0)", cn: "标准差", en_def: "How much scores vary around the mean.", cn_def: "分数围绕平均数波动的平均程度。", hint: "最有代表性的离散趋势指标。" },
                { term: "Percentile rank", cn: "百分等级", en_def: "The percentage of scores that fall below a given score.", cn_def: "低于某个分数的人数占总人数的百分比。", hint: "‘你在千军万马中的排位’。99th percentile意味着你超过了99%的人。" },
                { term: "Regression toward the mean", cn: "均值回归", en_def: "Tendency for extreme scores to fall back toward the average.", cn_def: "极端的分数或表现随时间回到平庸/平均水平的倾向。", hint: "考了满分的人，下次大概率会稍微退步一点点。" },

                { term: "Scatterplot", cn: "散点图", en_def: "A graphed cluster of dots, representing the values of two variables.", cn_def: "展示两个变量关联情况的点群图。", hint: "‘星星点点’。点的趋势可以看出相关的强弱和方向。" },
                { term: "Correlation coefficient", cn: "相关系数 (r)", en_def: "Statistical index of relationship between two things (-1 to +1).", cn_def: "衡量两者关系强度和方向的统计指标。", hint: "数值越接近1，越相关；正值代表同向变化，负值代表反向变化。" },
                { term: "Effect size", cn: "效应量", en_def: "Magnitude of the difference between groups.", cn_def: "实验处理产生的实际影响的大小、强度的指标。", hint: "不仅看‘有没有用’，还看‘有多大用’。" },
                { term: "Statistical significance (Unit 0)", cn: "统计显著性", en_def: "Likelihood that a result occurred by chance (p < .05).", cn_def: "所得结果仅仅因为偶然发生的可能性极低。", hint: "科学的‘可信度’。p<0.05代表你中奖（结果为假）的概率低于5%。" }
            ],
            "Unit 1: Biological Bases": [
                // Topic 1.1: Interaction of Heredity and Environment
                { term: "Evolutionary Perspective", cn: "进化心理学视角", en_def: "The study of the evolution of behavior and the mind, using principles of natural selection.", cn_def: "利用自然选择原理研究行为和心理进化的学科。", hint: "‘适应环境’。为什么我们害怕蛇？因为祖先里怕蛇的更容易活下来传宗接代。" },
                { term: "Natural Selection", cn: "自然选择", en_def: "The principle that inherited traits that better enable an organism to survive and reproduce will most likely be passed on.", cn_def: "指那些能更好地使生物生存和繁衍的遗传特征最有可能被传递下去的原理。", hint: "‘适者生存’。大自然像个筛子，优良的基因被留了下来。" },
                { term: "Eugenics", cn: "优生学", en_def: "The study of how to arrange reproduction within a human population to increase the occurrence of heritable characteristics regarded as desirable.", cn_def: "研究如何通过控制人类繁衍来增加‘优良’遗传特性的学科。", hint: "‘基因改良计划’。虽然历史上很有争议，但它试图‘人为干预’人类的进化。" },
                { term: "Twin Studies", cn: "双生子研究", en_def: "Research that compares identical and fraternal twins to determine the relative influence of heredity and environment.", cn_def: "通过比较同卵和异卵双胞胎来确定遗传和环境相对影响的研究。", hint: "‘遗传 vs 环境’的最佳实验。如果失散多年的同卵双胞胎性格极像，说明遗传力量巨大。" },

                // Topic 1.2: Overview of the Nervous System
                { term: "Central Nervous System (CNS)", cn: "中枢神经系统", en_def: "The brain and spinal cord.", cn_def: "大脑和脊髓。", hint: "大脑的‘司令部’。身体所有的核心决策和反射弧都在这里处理。" },
                { term: "Peripheral Nervous System (PNS)", cn: "外周神经系统", en_def: "The sensory and motor neurons that connect the CNS to the rest of the body.", cn_def: "连接中枢神经系统与身体其他部分的感官和运动神经元。", hint: "身体的‘情报网’。负责把外部信息传进来，把中央指令传出去。" },
                { term: "Autonomic Nervous System", cn: "自主神经系统", en_def: "The part of the PNS that controls the glands and muscles of the internal organs.", cn_def: "外周神经系统中控制内脏腺体和肌肉的部分。", hint: "‘自动档’。你不需要操心心跳和消化，它会帮你搞定。" },
                { term: "Somatic Nervous System", cn: "躯体神经系统", en_def: "The division of the peripheral nervous system that controls the body's skeletal muscles.", cn_def: "外周神经系统中控制骨骼肌运动的部分。", hint: "‘手动档’。当你想举手或走路时，就是这个系统在工作。" },
                { term: "Sympathetic Nervous System", cn: "交感神经系统", en_def: "The division of the autonomic nervous system that arouses the body, mobilizing its energy.", cn_def: "自主神经系统中负责唤醒身体的部分，在压力情境下动员能量。", hint: "大脑的‘油门’。遇到危险时让你心跳加速、瞳孔放大，准备‘战斗或逃跑’。" },
                { term: "Parasympathetic Nervous System", cn: "副交感神经系统", en_def: "The division of the autonomic nervous system that calms the body, conserving its energy.", cn_def: "自主神经系统中负责使身体平静并保存能量的部分。", hint: "大脑的‘刹车’。当危险过去，它让你安静下来，进入‘休息和消化’模式。" },

                // Topic 1.3: The Neuron and Neural Firing
                { term: "Neuron", cn: "神经元", en_def: "The basic building block of the nervous system.", cn_def: "神经系统的基本构建单元。", hint: "大脑的‘砖块’。它是负责接收、处理和传递信息的信息细胞。" },
                { term: "Glial Cells", cn: "神经胶质细胞", en_def: "Cells in the nervous system that support, nourish, and protect neurons.", cn_def: "神经系统中支持、营养和保护神经元的细胞。", hint: "神经元的‘保姆和私人保镖’。它们不直接传递信息，但没有它们神经元活不下去。" },
                { term: "Reflex Arc", cn: "反射弧", en_def: "The nerve pathway involved in a reflex activity.", cn_def: "参与反射活动的神经通路。", hint: "‘身体的急诊室’。手碰到热锅立刻缩回来，信息只到脊髓没到大脑就做出了决定。" },
                { term: "Sensory Neurons", cn: "感觉神经元", en_def: "Neurons that carry incoming info from the sensory receptors to the brain/spinal cord.", cn_def: "将感官受器的信息传向中枢神经系统的神经元。", hint: "‘侦察兵’。把皮肤摸到的、眼睛看到的传回中央。" },
                { term: "Motor Neurons", cn: "运动神经元", en_def: "Neurons that carry outgoing info from the brain/spinal cord to the muscles/glands.", cn_def: "将中枢神经系统的指令传向肌肉或腺体的神经元。", hint: "‘传令兵’。把大脑‘举手’的命令带给肌肉。" },
                { term: "Interneurons", cn: "中间神经元", en_def: "Neurons within the brain and spinal cord that communicate internally.", cn_def: "中枢神经系统内部负责内部沟通的神经元。", hint: "‘中间商’。它们在大脑和脊髓里负责把感觉和运动信号连接起来。" },
                { term: "All-or-Nothing Principle", cn: "全或无原则", en_def: "A neuron's reaction of either firing or not firing.", cn_def: "神经元要么完全发射，要么不发射的反应方式。", hint: "‘开枪’。扣动扳机，子弹要么打出去，要么不发，没有‘半颗子弹’。" },
                { term: "Action Potential", cn: "动作电位", en_def: "A neural impulse; a brief electrical charge that travels down an axon.", cn_def: "神经冲动；沿轴突向下传播的短暂电荷变化。", hint: "大脑的‘闪电’。这是神经元‘说话’的方式，一次快速的放电过程。" },
                { term: "Depolarization", cn: "去极化", en_def: "The process during the action potential when sodium is rushing into the cell causing the interior to become more positive.", cn_def: "动作电位期间，钠离子涌入细胞导致内部电位变正的过程。", hint: "‘大门洞开’。正离子冲进去，打破了平静，点燃了神经冲动。" },
                { term: "Refractory Period", cn: "不应期", en_def: "A period of inactivity after a neuron has fired.", cn_def: "神经元发射后的短暂休整期。", hint: "‘冷却时间’。技能刚放完，需要一点时间回蓝才能放下一个。" },
                { term: "Resting Potential", cn: "静息电位", en_def: "The positive-outside/negative-inside state of the axon membrane.", cn_def: "轴突膜外正内负的待机状态。", hint: "‘蓄势待发’。像拉满的弓，虽然没动，但充满了潜能。" },
                { term: "Reuptake", cn: "再摄取", en_def: "A neurotransmitter's reabsorption by the sending neuron.", cn_def: "发送端神经元对神经递质的重新吸收过程。", hint: "资源的‘循环利用’。为了不浪费，突触前膜会把还没用掉的信使重新吸回去。" },
                { term: "Threshold", cn: "阈值", en_def: "The level of stimulation required to trigger a neural impulse.", cn_def: "触法神经冲动所需的最低刺激水平。", hint: "大脑的‘起跑线’。刺激必须达到这个点，神经元才会决定‘发射’。" },
                { term: "Multiple Sclerosis", cn: "多发性硬化症", en_def: "A disease in which the immune system eats away at the protective covering of nerves.", cn_def: "一种免疫系统攻击神经保护层（髓鞘）的疾病。", hint: "‘线路漏电’。髓鞘受损，导致神经信号传输混乱或中断。" },
                { term: "Myasthenia Gravis", cn: "重症肌无力", en_def: "A chronic autoimmune disease that affects the neuromuscular junction.", cn_def: "一种影响神经肌肉接头的慢性自身免疫性疾病。", hint: "‘信号接收失败’。神经能发命令，但肌肉接不住，导致严重的肌肉无力。" },
                { term: "Excitatory Neurotransmitter", cn: "兴奋性神经递质", en_def: "Neurotransmitters that increase the likelihood that a neuron will fire.", cn_def: "增加神经元发射可能性的神经递质。", hint: "大脑的‘加油站’。它们促使下一个神经元变得兴奋起来。" },
                { term: "Inhibitory Neurotransmitter", cn: "抑制性神经递质", en_def: "Neurotransmitters that decrease the likelihood that a neuron will fire.", cn_def: "降低神经元发射可能性的神经递质。", hint: "大脑的‘灭火器’。它们让神经元‘冷静’，不要发射冲动。" },
                { term: "Dopamine", cn: "多巴胺", en_def: "Influences movement, learning, attention, and emotion.", cn_def: "影响运动、学习、注意力和情绪。", hint: "‘奖励因子’。与快乐、成瘾、帕金森症和精神分裂症有关。" },
                { term: "Serotonin", cn: "血清素", en_def: "Affects mood, hunger, sleep, and arousal.", cn_def: "影响情绪、饥饿、睡眠和觉醒。", hint: "‘情绪稳定剂’。如果它不够，你可能会感到抑郁。" },
                { term: "Norepinephrine", cn: "去甲肾上腺素", en_def: "Helps control alertness and arousal.", cn_def: "帮助控制警觉和觉醒。", hint: "‘战斗信使’。让你在紧急情况下保持高度清醒。" },
                { term: "Glutamate", cn: "谷氨酸", en_def: "A major excitatory neurotransmitter; involved in memory.", cn_def: "主要的兴奋性神经递质；涉及记忆。", hint: "‘最强油门’。大脑里最丰富的兴奋性递质。" },
                { term: "GABA", cn: "γ-氨基丁酸", en_def: "A major inhibitory neurotransmitter.", cn_def: "主要的抑制性神经递质。", hint: "‘最强刹车’。帮助大脑抑制过度兴奋，如果不足可能导致抽搐或失眠。" },
                { term: "Substance P", cn: "P物质", en_def: "A neurotransmitter involved in pain perception and immune response.", cn_def: "涉及疼痛感知和免疫反应的神经递质。", hint: "‘痛觉快递员’。它负责把疼痛的信号传给大脑。" },
                { term: "Endorphins", cn: "内啡肽", en_def: "Natural, opiate-like neurotransmitters linked to pain control and pleasure.", cn_def: "天然的止痛和产生快乐的递质。", hint: "大脑里的‘止疼药’。" },
                { term: "Acetylcholine", cn: "乙酰胆碱", en_def: "Enables muscle action, learning, and memory.", cn_def: "使肌肉活动、学习和记忆成为可能。", hint: "‘肌肉开关’。如果它被阻断（如肉毒杆菌），人就会瘫痪。" },
                { term: "Agonist", cn: "激动剂/拮抗剂", en_def: "A molecule that stimulates a response by binding to a receptor.", cn_def: "通过结合受体来激发反应的分子。", hint: "‘伪装的钥匙’。模仿神经递质把锁打开。" },
                { term: "Antagonist", cn: "拮抗剂", en_def: "A molecule that inhibits or blocks a response.", cn_def: "抑制或阻断反应的分子。", hint: "‘堵锁眼的棍子’。占着位置但不干活。" },
                { term: "Reuptake Inhibitor", cn: "再摄取抑制剂", en_def: "A drug that blocks the reabsorption of neurotransmitters.", cn_def: "阻断神经递质重新吸收的药物。", hint: "‘延长保质期’。让信使在外面待得更久，发挥更大作用，如SSRIs。" },
                { term: "Endocrine System", cn: "内分泌系统", en_def: "The body's 'slow' chemical communication system via hormones.", cn_def: "通过激素进行的慢速化学通信系统。", hint: "‘邮寄信件’。虽然慢，但持久且遍布全身。" },
                { term: "Hormones", cn: "激素/荷尔蒙", en_def: "Chemical messengers traveling through the bloodstream.", cn_def: "通过血液传播的化学信使。", hint: "血液里的快递。" },
                { term: "Psychoactive Drugs", cn: "精神药物", en_def: "Chemical substances that alter perception and moods.", cn_def: "改变感知和情绪的化学物质。", hint: "‘大脑滤镜’。改变神经递质的工作方式。" },
                { term: "Substance Use Disorder", cn: "物质滥用障碍", en_def: "Continued substance craving despite significant life disruption.", cn_def: "尽管生活受到严重干扰，仍持续渴望使用某种物质。", hint: "‘成瘾带来的失控’。" },
                { term: "Depressants", cn: "抑制剂", en_def: "Drugs that reduce neural activity and slow body functions.", cn_def: "降低神经活动并减慢身体功能的药物。", hint: "‘大脑的减速带’。如酒精。" },
                { term: "Tolerance", cn: "耐受性", en_def: "Diminishing effect with regular use of the same dose of a drug.", cn_def: "经常使用同等剂量的药物后，效果逐渐减弱的现象。", hint: "‘胃口变大了’。下次得用更多才有效。" },
                { term: "Addiction", cn: "成瘾", en_def: "Compulsive craving of drugs or certain behaviors despite adverse consequences.", cn_def: "尽管有不良后果，仍强迫性地渴望药物或某些行为。", hint: "‘停不下来的渴求’。" },
                { term: "Withdrawal", cn: "戒断反应", en_def: "Discomfort and distress following discontinuing an addictive drug.", cn_def: "停用成瘾药物后出现的痛苦和不适。", hint: "‘戒瘾后的反弹’。" },
                { term: "Barbiturates", cn: "巴比妥类药物", en_def: "Drugs that depress CNS activity, reducing anxiety but impairing memory.", cn_def: "抑制中枢神经系统活动的药物，能减少焦虑但会损耗记忆。", hint: "‘强力镇静剂’。" },
                { term: "Opioids", cn: "鸦片类药物", en_def: "Opium and its derivatives, used to relieve pain and create euphoria.", cn_def: "鸦片及其衍生物，用于止痛和产生欣快感。", hint: "‘强效止痛药’。高成瘾性。" },
                { term: "Stimulants", cn: "兴奋剂", en_def: "Drugs that excite neural activity and speed up body functions.", cn_def: "激发神经活动并加速身体功能的药物。", hint: "‘大脑的能量饮品’。如可卡因、咖啡因。" },
                { term: "Hallucinogens", cn: "致幻剂", en_def: "Psychedelic drugs that distort perceptions and evoke sensory images.", cn_def: "扭曲感知并唤起感官意象的精神药物。", hint: "‘大脑的幻灯片’。如LSD。" },

                // Module 1.4: The Brain
                { term: "Biological Psychologist", cn: "生物心理学家", en_def: "A psychologist that focuses on the links between biology and behavior.", cn_def: "专注于生物学与行为之间联系的心理学家。", hint: "‘神经探险者’。研究肉体如何产生灵魂。" },
                { term: "Biopsychosocial Approach", cn: "生物心理社会视角", en_def: "An integrated approach that incorporates biological, psychological, and social-cultural levels of analysis.", cn_def: "综合生物、心理和社会文化层面进行分析的视角。", hint: "‘全景视角’。看病不能只看细胞，还要看心情和环境。" },
                { term: "Neuroplasticity", cn: "神经可塑性", en_def: "The brain's ability to reorganizing after damage or build new pathways.", cn_def: "大脑受损后重新组织或建立新通路的能力。", hint: "‘橡皮泥大脑’。" },
                { term: "Lesion", cn: "损伤/损毁", en_def: "Tissue destruction.", cn_def: "组织破坏。", hint: "‘破坏性观察’。" },
                { term: "EEG", cn: "脑电图", en_def: "A recording of the waves of electrical activity sweeping across the brain's surface.", cn_def: "大脑表面电活动的记录。", hint: "‘脑波写手’。" },
                { term: "fMRI", cn: "功能磁共振成像", en_def: "A technique for revealing bloodflow and brain activity.", cn_def: "揭示血流变化和大脑活动的技术。", hint: "‘大脑的动图’。" },
                { term: "Medulla", cn: "延髓", en_def: "The base of the brainstem; controls heartbeat and breathing.", cn_def: "脑干基部；控制心跳和呼吸。", hint: "‘生存中心’。" },
                { term: "Reticular Activating System (RAS)", cn: "网状激活系统", en_def: "A nerve network in the brainstem that plays an important role in controlling arousal.", cn_def: "脑干中负责控制警觉和觉醒的神经网络。", hint: "大脑的‘总电闸’。它决定你是醒着还是昏迷。" },
                { term: "Thalamus", cn: "丘脑", en_def: "The brain's sensory switchboard.", cn_def: "大脑的感官中转站。", hint: "大脑的‘总机’。" },
                { term: "Cerebellum", cn: "小脑", en_def: "Coordinates movement output and balance.", cn_def: "协调运动输出和平衡。", hint: "‘小人脑’。" },
                { term: "Limbic System", cn: "边缘系统", en_def: "Associated with emotions and drives.", cn_def: "与情绪和动机有关。", hint: "‘情绪脑’。" },
                { term: "Amygdala", cn: "杏仁核", en_def: "Linked to emotion, especially fear and anger.", cn_def: "与情绪有关，尤其是恐惧和愤怒。", hint: "‘恐惧中心’。" },
                { term: "Hypothalamus", cn: "下丘脑", en_def: "Directs maintenance activities (eating, drinking, temp).", cn_def: "指挥进食、饮水、体温调节等维持活动。", hint: "大脑的‘恒温器’。" },
                { term: "Hippocampus", cn: "海马体", en_def: "Helps process explicit memories for storage.", cn_def: "帮助处理并存储外显记忆。", hint: "‘记忆存储站’。" },
                { term: "Cerebral Cortex", cn: "大脑皮层", en_def: "Highest level of information processing.", cn_def: "最高级的信息处理中心。", hint: "大脑的‘褶皱外壳’。" },
                { term: "Frontal Lobes", cn: "额叶", en_def: "Making plans and judgments.", cn_def: "制定计划和判断。", hint: "‘理性司令部’。" },
                { term: "Parietal Lobes", cn: "顶叶", en_def: "Receives sensory input for touch.", cn_def: "接收触觉感官输入。", hint: "‘触感中心’。" },
                { term: "Occipital Lobes", cn: "枕叶", en_def: "Receives information from the visual fields.", cn_def: "接收视野信息。", hint: "‘视觉处理器’。" },
                { term: "Temporal Lobes", cn: "颞叶", en_def: "Includes auditory areas.", cn_def: "包含听觉区域。", hint: "‘听觉中心’。" },
                { term: "Motor Cortex", cn: "运动皮层", en_def: "Controls voluntary movements.", cn_def: "控制自发运动。", hint: "‘运动指挥塔’。" },
                { term: "Somatosensory Cortex", cn: "躯体感觉皮层", en_def: "Processes body touch and movement sensations.", cn_def: "处理触觉和运动感觉。", hint: "‘感觉反馈点’。" },
                { term: "Association Areas", cn: "联合区", en_def: "Areas of the cerebral cortex involved in higher mental functions.", cn_def: "大脑皮层中涉及高级心理功能的区域。", hint: "‘拼图室’。把感觉拼凑成意义。" },
                { term: "Neurogenesis", cn: "神经发生", en_def: "The formation of new neurons.", cn_def: "新神经元的形成过程。", hint: "‘大脑再生’。" },
                { term: "Corpus Callosum", cn: "胼胝体", en_def: "Connects the two brain hemispheres.", cn_def: "连接左、右两大脑半球。", hint: "‘大脑的跨海大桥’。" },
                { term: "Contralateral Organization", cn: "对侧组织", en_def: "One side of the brain controls the opposite side of the body.", cn_def: "大脑一侧控制身体另一侧的现象。", hint: "‘左撇子右脑管’。" },
                { term: "Split Brain", cn: "分裂脑", en_def: "Condition resulting from cutting the corpus callosum.", cn_def: "切断胼胝体后大脑两半球隔离开的状态。", hint: "‘大脑闹分家’。" },

                // Module 1.5 Sleep
                { term: "Consciousness", cn: "意识", en_def: "Our awareness of ourselves and our environment.", cn_def: "我们对自身及环境的觉知状态。", hint: "‘醒着的觉察’。" },
                { term: "Cognitive Neuroscience", cn: "认知神经科学", en_def: "Interdisciplinary study of the brain activity linked with cognition.", cn_def: "研究大脑活动与认知之间联系的跨学科研究。", hint: "‘思维的生理学’。" },
                { term: "Circadian Rhythm", cn: "昼夜节律", en_def: "Regular bodily rhythms (e.g., of temperature and sleep) that occur on a 24-hour cycle.", cn_def: "在24小时周期内发生的规律性身体节律（如体温和睡眠）。", hint: "‘生物钟’。" },
                { term: "REM Sleep", cn: "快速眼动睡眠", en_def: "Rapid eye movement sleep; a recurring sleep stage during which vivid dreams commonly occur.", cn_def: "一个周期性出现的睡眠阶段，期间常发生生动的梦境。", hint: "‘做梦现场’。虽然在睡觉，但脑电波像醒着一样活跃。" },
                { term: "NREM Sleep", cn: "非快速眼动睡眠", en_def: "Non-rapid eye movement sleep; encompasses all sleep stages except for REM sleep.", cn_def: "除了快速眼动睡眠之外的所有睡眠阶段的总称。", hint: "‘安静的睡眠’。" },
                { term: "Alpha Waves", cn: "α波", en_def: "Relatively slow brain waves of a relaxed, awake state.", cn_def: "处于放松、清醒状态时相对缓慢的脑电波。", hint: "‘闭目养神波’。" },
                { term: "Hypnagogic Sensations", cn: "入睡期幻觉", en_def: "Sensations like falling or floating that occur while falling asleep.", cn_def: "入睡时产生的如坠落或漂浮的感觉。", hint: "‘被鬼压床’或‘突然踩空’的感觉。" },
                { term: "Delta Waves", cn: "δ波", en_def: "Large, slow brain waves associated with deep sleep.", cn_def: "与深度睡眠相关的巨大、缓慢的脑电波。", hint: "‘深睡巨波’。" },
                { term: "Insomnia", cn: "失眠", en_def: "Recurring problems in falling or staying asleep.", cn_def: "反复出现的入睡或维持睡眠困难的问题。", hint: "‘长夜漫漫无心睡眠’。" },
                { term: "Narcolepsy", cn: "发作性睡病", en_def: "A sleep disorder characterized by uncontrollable sleep attacks.", cn_def: "以无法控制的睡眠发作为特征的睡眠障碍。", hint: "‘秒睡帝’。走着走着可能就突然栽倒进入REM睡眠。" },
                { term: "Sleep Apnea", cn: "睡眠呼吸暂停", en_def: "A sleep disorder characterized by temporary cessations of breathing during sleep.", cn_def: "以睡眠期间呼吸暂时停止为特征的睡眠障碍。", hint: "‘憋气式打呼噜’。" },
                { term: "REM Sleep Behavior Disorder", cn: "REM睡眠行为障碍", en_def: "A sleep disorder where a person acts out their dreams.", cn_def: "一种在梦境中活动身体、把梦演出来的睡眠障碍。", hint: "‘梦中武打家’。本该全身麻痹的REM阶段，肌肉却动了。" },
                { term: "Dreams", cn: "梦", en_def: "A sequence of images, emotions, and thoughts passing through a sleeping person's mind.", cn_def: "睡眠者脑海中出现的一系列意象、情绪和思想。", hint: "‘夜间影院’。" },
                { term: "REM Rebound", cn: "REM反弹", en_def: "The tendency for REM sleep to increase following REM sleep deprivation.", cn_def: "在REM睡眠剥夺后，REM阶段增加的倾向。", hint: "‘补觉的反击’。" },
                { term: "Activation Synthesis Theory", cn: "激活-整合理论", en_def: "The theory that dreams are the brain's attempt to synthesize random neural activity.", cn_def: "认为梦是大脑试图将随机神经活动编成故事的理论。", hint: "‘瞎编乱造’。大脑在清理垃圾信号时顺便讲了个离谱的故事。" },
                { term: "Consolidation Theory", cn: "巩固理论", en_def: "The theory that sleep helps consolidate the day's experiences into long-term memory.", cn_def: "认为睡眠有助于将当天的经历巩固到长时记忆中的理论。", hint: "‘夜间存档员’。一边睡觉一边把学到的知识存进硬盘。" },

                // Module 1.6 Sensation
                { term: "Sensation", cn: "感觉", en_def: "The process by which our sensory receptors receive stimulus energies from our environment.", cn_def: "我们的感官受器接收来自环境的刺激能量的过程。", hint: "‘原始数据输入’。" },
                { term: "Sensory Receptors", cn: "感官受器", en_def: "Sensory nerve endings that respond to stimuli.", cn_def: "对刺激作出反应的感觉神经末梢。", hint: "‘生物传感器’。" },
                { term: "Perception", cn: "知觉", en_def: "The process of organizing and interpreting sensory information.", cn_def: "组织和解释感官信息的过程。", hint: "‘给数据贴标签’。看到红点（感觉）并意识到那是火（知觉）。" },
                { term: "Blindsight", cn: "盲视", en_def: "A condition in which a person can respond to a visual stimulus without consciously experiencing it.", cn_def: "指人能对视觉刺激做出反应，但主观上却看不到它的现象。", hint: "‘身体看见了，但脑子没看见’。虽然觉得自己瞎了，却能避开路上的障碍。" },
                { term: "Bottom-Up Processing", cn: "自下而上的加工", en_def: "Analysis that begins with the sensory receptors and works up to the brain's integration of sensory information.", cn_def: "从底层感官输入开始向高级处理阶段发展的加工过程。", hint: "‘像素级感知’。像婴儿第一次看世界，完全靠感官输入拼凑。" },
                { term: "Top-Down Processing", cn: "自上而下的加工", en_def: "Information processing guided by higher-level mental processes.", cn_def: "受经验、动机和期望驱动的信息加工过程。", hint: "‘脑补大师’。根据你的背景知识来理解看到的东西。" },
                { term: "Absolute Threshold", cn: "绝对阈限", en_def: "The minimum stimulation needed to detect a particular stimulus 50 percent of the time.", cn_def: "在50%的时间里能检测到特定刺激所需的最小刺激量。", hint: "‘检测的底线’。你能听到的最轻的声音。" },
                { term: "Signal Detection Theory", cn: "信号检测论", en_def: "A theory predicting how and when we detect the presence of a faint stimulus (signal) amid background stimulation (noise).", cn_def: "预测我们如何及何时在背景噪音中检测到微弱信号的理论。", hint: "‘新妈妈能听到宝宝一丁点哭声’。跟生理和期待度有关。" },
                { term: "Difference Threshold", cn: "差别阈限", en_def: "The minimum difference between two stimuli required for detection 50 percent of the time.", cn_def: "在50%的时间里能检测到两个刺激之间差异的最小改变量。", hint: "‘刚刚能辨别出的差异’。也叫jnd。" },
                { term: "Weber's Law", cn: "韦伯定律", en_def: "The principle that, to be perceived as different, two stimuli must differ by a constant minimum percentage.", cn_def: "为了感知到差异，两个刺激必须按恒定比例（而非恒定量）变化的原理。", hint: "‘一斤苹果多给一两你能感觉到，十斤苹果多给一两你感觉不到’。" },
                { term: "Sensory Adaptation", cn: "感觉适应", en_def: "Diminished sensitivity as a consequence of constant stimulation.", cn_def: "由于持续受刺激而导致敏感度降低的现象。", hint: "‘久居兰室不闻其香’。时间长了你就不觉得室友身上有味了。" },
                { term: "Sensory Interaction", cn: "感觉相互作用", en_def: "The principle that one sense may influence another.", cn_def: "一种感觉可能会影响另一种感觉的原理。", hint: "‘感冒了吃东西没味’。嗅觉影响了味觉。" },
                { term: "Wavelength", cn: "波长", en_def: "The distance from the peak of one light or sound wave to the peak of the next.", cn_def: "光波或声波一个波峰到下一个波峰之间的距离。", hint: "决定‘颜色’或‘音调’。" },
                { term: "Intensity", cn: "强度", en_def: "The amount of energy in a light or sound wave.", cn_def: "光波或声波中所包含的能量多少。", hint: "决定‘亮度’或‘音量’。" },
                { term: "Hue", cn: "色调", en_def: "The dimension of color that is determined by the wavelength of light.", cn_def: "由光波长度决定的颜色维度。", hint: "就是‘什么颜色’。" },
                { term: "Ganglion Cells", cn: "神经节细胞", en_def: "Neurons in the eye that receive information from bipolar cells; their axons form the optic nerve.", cn_def: "眼球中从双极细胞接收信息的神经元；其轴突构成视神经。", hint: "视觉的‘出口汇总员’。" },
                { term: "Accommodation (Visual)", cn: "视觉调节", en_def: "The process by which the eye's lens changes shape to focus near or far objects on the retina.", cn_def: "眼睛晶状体改变形状以使近处或远处物体聚焦在视网膜上的过程。", hint: "屏幕‘变焦’功能。" },
                { term: "Rods", cn: "视杆细胞", en_def: "Retinal receptors that detect black, white, and gray; necessary for peripheral and twilight vision.", cn_def: "探测黑白灰的视网膜受体；负责外周和微光视觉。", hint: "‘夜视仪’。在暗处它们很管用。" },
                { term: "Cones", cn: "视锥细胞", en_def: "Retinal receptors that function in daylight or in well-lit conditions; detect fine detail and color.", cn_def: "在日光或光线充足时工作的受体；探测细节和颜色。", hint: "‘彩显头’。在亮处它们管用，且能分辨颜色。" },
                { term: "Fovea", cn: "中央凹", en_def: "The central focal point in the retina, around which the eye's cones cluster.", cn_def: "视网膜的中心焦点，大量视锥细胞聚集于此。", hint: "‘最清晰点’。你想看清细节时，眼球会自动把像对准这里。" },
                { term: "Optic Nerve", cn: "视神经", en_def: "The nerve that carries neural impulses from the eye to the brain.", cn_def: "将神经冲动从眼球带向大脑的神经。", hint: "‘视觉数据线’。" },
                { term: "Blind Spot", cn: "盲点", en_def: "The point at which the optic nerve leaves the eye, creating a 'blind' spot because no receptor cells are located there.", cn_def: "视神经离开眼球的点，因为没有受体细胞，这里是视觉盲区。", hint: "‘视觉空洞’。" },
                { term: "Nearsightedness", cn: "近视", en_def: "A condition in which nearby objects are seen more clearly than distant objects.", cn_def: "近处物体比远处物体看更清楚的状态。", hint: "眼球太长。" },
                { term: "Farsightedness", cn: "远视", en_def: "A condition in which faraway objects are seen more clearly than near objects.", cn_def: "远处物体比近处物体看更清楚的状态。", hint: "眼球太短。" },
                { term: "Trichromatic Theory", cn: "三原色理论", en_def: "The theory that the retina contains three different color receptors—red, green, and blue.", cn_def: "视网膜包含红、绿、蓝三种不同颜色受体的理论。", hint: "也叫Young-Helmholtz理论。" },
                { term: "Opponent Process Theory", cn: "拮抗加工理论", en_def: "The theory that opposing retinal processes (red-green, yellow-blue, white-black) enable color vision.", cn_def: "认为对立的视网膜加工过程（红绿、黄蓝、黑白）实现了彩色视觉的理论。", hint: "解释‘错觉后像’。看到绿旗子的鬼影变成红色就是这个原理。" },
                { term: "Dichromatism", cn: "二色视觉", en_def: "A condition in which one of the three basic color mechanisms is absent or not functioning.", cn_def: "三种基本颜色机制中有一种缺失或不正常的色盲状态。", hint: "最常见的‘色盲’形式。" },
                { term: "Monochromatism", cn: "全色盲", en_def: "Total color blindness.", cn_def: "完全的色盲，只能看黑白灰。", hint: "像老式黑白电视。" },
                { term: "Afterimage", cn: "后像", en_def: "A visual image that persists after a stimulus is removed.", cn_def: "刺激移除后仍然存留的视觉映像。", hint: "盯着灯看很久，闭上眼还有个影子。" },
                { term: "Feature Detectors", cn: "特征检测器", en_def: "Nerve cells in the brain that respond to specific features of the stimulus (e.g., shape, angle).", cn_def: "大脑中对刺激的特定特征（如形状、角度）做出反应的神经细胞。", hint: "‘专门的分拣员’。有的只看横线，有的只看弧线。" },
                { term: "Parallel Processing", cn: "平行加工", en_def: "The processing of many aspects of a problem simultaneously.", cn_def: "在大脑中同时处理问题的多个方面。", hint: "‘多线程处理’。大脑能同时处理颜色、形状、运动、深度。" },
                { term: "Audition", cn: "听觉", en_def: "The sense or act of hearing.", cn_def: "听觉或听的过程。", hint: "就是‘听’。" },
                { term: "Frequency", cn: "频率", en_def: "The number of complete wavelengths that pass a point in a given time.", cn_def: "单位时间内通过某一点的完整波的数量。", hint: "决定‘音调’。" },
                { term: "Pitch", cn: "音调/音高", en_def: "A tone's experienced highness or lowness; depends on frequency.", cn_def: "体验到的声音的高低；取决于频率。", hint: "高音低音之分。" },
                { term: "Middle Ear", cn: "中耳", en_def: "Contains three tiny bones (hammer, anvil, stirrup) that concentrate sound vibrations.", cn_def: "包含三块听小骨，负责集中声音震动。", hint: "‘放大器’。" },
                { term: "Cochlea", cn: "耳蜗", en_def: "A coiled, bony, fluid-filled tube in the inner ear involved in transduction.", cn_def: "内耳中充满了液体的螺旋形骨管，负责换能。", hint: "听觉的‘转换站’。把震动变电信号。" },
                { term: "Inner Ear", cn: "内耳", en_def: "The innermost part of the ear, containing the cochlea, semicircular canals, and vestibular sacs.", cn_def: "耳朵最深处，包含耳蜗、半规管和前庭囊。", hint: "听觉和平衡的核心所在地。" },
                { term: "Sensorineural Hearing Loss", cn: "感音神经性耳聋", en_def: "Hearing loss caused by damage to the cochlea's receptor cells or to the auditory nerves.", cn_def: "由耳蜗受体细胞或听神经受损引起的听力损失。", hint: "‘接收器坏了’。常见于噪音损伤。" },
                { term: "Conduction Hearing Loss", cn: "传导性耳聋", en_def: "Hearing loss caused by damage to the mechanical system that conducts sound waves to the cochlea.", cn_def: "由将声波导向耳蜗的机械系统受损引起的听力损失。", hint: "‘通路堵了’。如耳垢堵塞或听小骨受损。" },
                { term: "Place Theory", cn: "位置理论", en_def: "Theory that links the pitch we hear with the place where the cochlea's membrane is stimulated.", cn_def: "认为听到的音调与耳蜗膜被刺激的位置有关的理论。", hint: "‘位置决定高度（频率）’。" },
                { term: "Frequency Theory", cn: "频率理论", en_def: "Theory that the rate of nerve impulses traveling up the auditory nerve matches the frequency of a tone.", cn_def: "认为神经冲动频率与音调频率一致的理论。", hint: "‘速度匹配理论’。" },
                { term: "Gate-Control Theory", cn: "闸门控制理论", en_def: "Theory that the spinal cord contains a neurological 'gate' that blocks pain signals or allows them to pass on to the brain.", cn_def: "认为脊髓中有一个‘闸门’能阻断或放行疼痛信号的理论。", hint: "‘拍拍就不疼了’。通过非疼痛刺激干扰疼痛信号传输。" },
                { term: "Gustation", cn: "味觉", en_def: "The sense of taste.", cn_def: "通过舌头感知的味觉。", hint: "舌尖上的味道。" },
                { term: "Olfaction", cn: "嗅觉", en_def: "The sense of smell.", cn_def: "通过鼻子感知的嗅觉。", hint: "闻味儿。" },
                { term: "Umami", cn: "鲜味", en_def: "A savory taste.", cn_def: "除了酸甜苦咸之外的第五种味道（就像味精、肉）。", hint: "‘咸鲜味’。" },
                { term: "Oleogustus", cn: "脂味", en_def: "The taste of fat.", cn_def: "脂肪的味道。", hint: "近期发现的潜在第六种基本味道。" },
                { term: "Pheromones", cn: "信息素", en_def: "Chemical signals released by an animal that communicate information and affect the behavior of other animals.", cn_def: "动物释放的化学信号，能传递信息并影响其他动物的行为。", hint: "‘无声的化学诱惑’。" },
                { term: "Kinesthesis", cn: "动觉", en_def: "The system for sensing the position and movement of individual body parts.", cn_def: "感知身体各部分位置和运动的系统。", hint: "让你闭着眼也能准确碰到自己的脚趾。" },
                { term: "Vestibular Sense", cn: "前庭觉", en_def: "The sense of body movement and position, including the sense of balance.", cn_def: "对身体运动和位置的感知，包括平衡感。", hint: "‘大脑平衡仪’。内耳里的液体告诉你头的倾斜角度。" },
                { term: "Phantom Limb Syndrome", cn: "幻肢症", en_def: "The feeling that an amputated limb is still present.", cn_def: "感觉到已经截掉的肢体依然存在的现象。", hint: "‘不存在的痛’。大脑皮层还在寻找那个肢体发出的信号。" },
                { term: "Medulla", cn: "延髓", en_def: "The base of the brainstem; controls heartbeat and breathing.", cn_def: "脑干的基部；控制心跳和呼吸。", hint: "大脑的‘生命维持点’。如果这里坏了，恐怕就没法呼吸了。" },
                { term: "Thalamus", cn: "丘脑", en_def: "The brain's sensory switchboard, located on top of the brainstem.", cn_def: "大脑的感官中转站，位于脑干顶部。", hint: "大脑的‘总台接待’。除了嗅觉，所有感官信息都要先到它这里打卡，再分发到皮层。" },
                { term: "Reticular Formation", cn: "网状结构", en_def: "A nerve network in the brainstem that plays an important role in controlling arousal.", cn_def: "脑干中的神经网络，在控制警觉和觉醒方面起重要作用。", hint: "大脑的‘闹钟’。它决定你是清醒还是睡着，甚至能拦截那些不重要的背景噪音。" },
                { term: "Cerebellum", cn: "小脑", en_def: "The 'little brain' at the rear of the brainstem; functions include processing sensory input and coordinating movement output and balance.", cn_def: "位于脑干后方的‘小脑’；功能包括处理感官输入、协调运动输出和平衡。", hint: "大脑的‘陀螺仪’。你能稳稳地走路、优雅地跳舞，全靠它的精细调节。" },
                { term: "Limbic System", cn: "边缘系统", en_def: "Neural system located below the cerebral hemispheres; associated with emotions and drives.", cn_def: "位于大脑半球下方的神经系统；与情绪和动机有关。", hint: "大脑的‘情感与欲望中心’。包含海马体、杏仁核和下丘脑。" },
                { term: "Amygdala", cn: "杏仁核", en_def: "Two lima-bean-sized neural clusters in the limbic system; linked to emotion.", cn_def: "边缘系统中两颗豆形的神经核团；调节情绪（尤其是恐惧和攻击性）。", hint: "大脑的‘警报器’。遇到危险时那种瞬间的恐惧感就是它发出的，让你立刻进入应战状态。" },
                { term: "Hypothalamus", cn: "下丘脑", en_def: "It directs several maintenance activities (eating, drinking, body temperature).", cn_def: "指挥维持生命活动（进食、饮水、体温调节）。", hint: "大脑的‘恒温调节器’。它还管性欲和奖励机制（老鼠电击诱惑实验）。" },
                { term: "Hippocampus", cn: "海马体", en_def: "A neural center located in the limbic system; helps process explicit memories for storage.", cn_def: "位于边缘系统的神经中心；帮助处理并存储外显记忆。", hint: "大脑的‘存档管理员’。如果坏了，你就再也记不住新发生的事情了（如电影《记忆碎片》）。" },
                { term: "Cerebral Cortex", cn: "大脑皮层", en_def: "The intricate fabric of interconnected neural cells covering the cerebral hemispheres.", cn_def: "覆盖在大脑半球表面、由相互连接的神经细胞组成的复杂组织。", hint: "大脑的‘总司令部’。它是人类最高级的信息处理中心和各种心理功能的所在地。" },
                { term: "Frontal Lobes", cn: "额叶", en_def: "Involved in speaking and muscle movements and in making plans and judgments.", cn_def: "涉及言语、肌肉运动、制定计划和判断。", hint: "大脑的‘CEO’。负责高端思考、人格和执行任务。著名的菲尼亚斯·盖奇案例就伤到了这里。" },
                { term: "Parietal Lobes", cn: "顶叶", en_def: "Receives sensory input for touch and body position.", cn_def: "接收触觉和身体位置的感官输入。", hint: "大脑的‘坐标系’。你在黑暗中摸到自己的鼻子，全靠顶叶处理位置信息。" },
                { term: "Occipital Lobes", cn: "枕叶", en_def: "Includes areas that receive information from the visual fields.", cn_def: "包含接收视野信息的区域。", hint: "大脑的‘显示器’。后脑勺挨一闷棍会‘眼冒金星’，就是因为枕叶被震到了。" },
                { term: "Temporal Lobes", cn: "颞叶", en_def: "Includes the auditory areas, each receiving information primarily from the opposite ear.", cn_def: "包含听觉区域，每个区域主要接收来自对侧耳朵的信息。", hint: "大脑的‘音箱’。负责倾听世界，也与记忆和语言理解密切相关。" },
                { term: "Motor Cortex", cn: "运动皮层", en_def: "An area at the rear of the frontal lobes that controls voluntary movements.", cn_def: "额叶后部控制自发运动的区域。", hint: "大脑的‘遥控器’。它的一端管脚，一端管脸，指挥全身肌肉动起来。" },
                { term: "Somatosensory Cortex", cn: "躯体感觉皮层", en_def: "Area at the front of the parietal lobes that registers and processes body touch and movement sensations.", cn_def: "顶叶前部登记和处理身体触觉及运动感觉的区域。", hint: "大脑的‘触摸屏’。嘴唇和手指在皮层占的比例最大，因为它们最敏感。" },
                { term: "Association Areas", cn: "联合区", en_def: "Areas of the cerebral cortex that are not involved in primary motor or sensory functions.", cn_def: "大脑皮层中不涉及基本运动或感觉功能的区域，负责高级心理功能。", hint: "大脑的‘总控制室’。负责把散落的信息拼成有意义的理解、思考和回忆。" },
                { term: "Plasticity", cn: "可塑性", en_def: "The brain's ability to change, especially during childhood, by reorganizing after damage or by building new pathways based on experience.", cn_def: "大脑改变的能力，特别是在童年时期，或在受损后重新组织，或根据经验建立新通路。", hint: "‘大脑是橡皮泥’。学习新技能或中风康复，靠的就是神经元‘改道’。" },
                { term: "Neurogenesis", cn: "神经发生", en_def: "The formation of new neurons.", cn_def: "新神经元的形成过程。", hint: "大脑的‘再生’。虽然有限，但人类终其一生大脑其实都在产生新的细胞。" },
                { term: "Corpus Callosum", cn: "胼胝体", en_def: "The large band of neural fibers connecting the two brain hemispheres and carrying messages between them.", cn_def: "连接左、右两大脑半球并在这两者之间传递信息的巨大神经纤维束。", hint: "大脑的‘跨海大桥’。左脑和右脑全靠它在中间协调，切断它就会产生‘分裂脑’。" },
                { term: "Split Brain", cn: "分裂脑", en_def: "A condition resulting from surgery that isolates the brain's two hemispheres by cutting the corpus callosum.", cn_def: "通过切断胼胝体使大脑两半球隔离开来的手术状态。", hint: "‘同一个脑袋，两个灵魂’。左脑能说话，右脑能操作左手，互不干扰却又极其怪异。" },
                { term: "Broca's Area", cn: "布洛卡区", en_def: "Controls language expression; an area of the frontal lobe, usually in the left hemisphere, that directs the muscle movements involved in speech.", cn_def: "控制语言表达；额叶（通常在左半球）中指挥说话时肌肉运动的区域。", hint: "大脑的‘演说家’。如果这里坏了，你能听懂，但就是咬牙切齿吐不出一个完整的词。" },
                { term: "Wernicke's Area", cn: "威尔尼克区", en_def: "Controls language reception; a brain area involved in language comprehension and expression; usually in the left temporal lobe.", cn_def: "控制语言接收；涉及语言理解和表达的大脑区域；通常位于左颞叶。", hint: "大脑的‘翻译官’。如果这里坏了，你说话很顺溜但像‘乱码’，且完全听不懂别人的话。" }
            ],
            "Unit 2: Cognition": [
                // Topic 2.1: Perception
                { term: "Bottom-up processing", cn: "自下而上的加工", en_def: "Analysis that begins with the sensory receptors and works up to the brain's integration of sensory information.", cn_def: "从底层感官输入开始向高级处理阶段发展的加工过程。", hint: "‘像素级感知’。像婴儿第一次看世界，完全靠感官输入拼凑。" },
                { term: "Top-down processing", cn: "自上而下的加工", en_def: "Information processing guided by higher-level mental processes, as when we construct perceptions drawing on our experience and expectations.", cn_def: "受经验、动机和期望驱动的信息加工过程。", hint: "‘脑补大师’。根据你的背景知识来理解看到的东西。" },
                { term: "Schema", cn: "图式", en_def: "A concept or framework that organizes and interprets information.", cn_def: "组织和解释信息的概念或框架。", hint: "大脑里的‘分类文件夹’。看到四条腿、汪汪叫的就扔进‘狗’这个文件夹。" },
                { term: "Perceptual set", cn: "知觉定势", en_def: "A mental predisposition to perceive one thing and not another.", cn_def: "感知某一事物而非另一事物的心理倾向。", hint: "‘先入为主’。如果你被告知要看到一个老妇人，你在这张模糊的画里就很蓝看到少女。" },
                { term: "Context", cn: "情境", en_def: "The circumstances that form the setting for an event, statement, or idea.", cn_def: "形成事件、陈述或想法背景的情况。", hint: "‘环境影响判断’。同一个高个子，在篮球队里显得矮，在普通人里显得高。" },
                { term: "Gestalts: closure", cn: "格式塔：闭合律", en_def: "The tendency to fill in gaps to create a complete, whole object.", cn_def: "倾向于填补空白以创建一个完整、整体的对象。", hint: "‘联想补全’。看到三条没连上的弧线，你的大脑会自动把它看成一个圆。" },
                { term: "Gestalts: figure and ground", cn: "格式塔：图形与背景", en_def: "The organization of the visual field into objects (the figures) that stand out from their surroundings (the ground).", cn_def: "将视野组织为从周围环境（背景）中脱颖而出的对象（图形）。", hint: "‘主角与配角’。看那张著名的杯子/人脸图，你一次只能看到杯子或者是人脸。" },
                { term: "Gestalts: proximity", cn: "格式塔：接近律", en_def: "The tendency to group nearby figures together.", cn_def: "倾向于将彼此靠近的图形分为一组。", hint: "‘近朱者赤’。几条挨在一起的竖线会被你看成‘一排’。" },
                { term: "Gestalts: similarity", cn: "格式塔：相似律", en_def: "The tendency to group similar figures together.", cn_def: "倾向于将相似的图形分为一组。", hint: "‘物以类聚’。穿同样颜色队服的人会被你看成一个团队。" },
                { term: "Selective attention", cn: "选择性注意", en_def: "The focusing of conscious awareness on a particular stimulus.", cn_def: "将意识聚焦于特定刺激的过程。", hint: "大脑的‘聚光灯’。晚饭桌上那么吵，你却能精准听到有人在说你坏话。" },
                { term: "Cocktail party effect", cn: "鸡尾酒会效应", en_def: "Your ability to attend to only one voice among many.", cn_def: "在嘈杂环境下专注于单一声音的能力。", hint: "如果你在聚会上听到自己的名字，你的注意力会瞬间‘瞬移’过去。" },
                { term: "Inattentional blindness", cn: "无意盲视", en_def: "Failing to see visible objects when our attention is directed elsewhere.", cn_def: "当注意力集中在别处时看而不见明显物体的现象。", hint: "‘大猩猩实验’。你光顾着数传球次数，却没看见一个穿猩猩皮的人走过。" },
                { term: "Change blindness", cn: "变化盲视", en_def: "Failing to notice changes in the environment.", cn_def: "未能注意到环境中的变化。", hint: "‘移花接木’。实验者中途换了个人跟你说话，你可能完全没发现。" },
                { term: "Binocular cue: Retinal disparity", cn: "双眼线索：视网膜像差", en_def: "A binocular cue for perceiving depth by comparing images from the retinas in the two eyes.", cn_def: "通过比较两眼视网膜上的图像差异来感知深度的双眼线索。", hint: "‘两眼看世界’。把手指放在眼前，左眼看和右眼看位置不一样，离得越近差得越多。" },
                { term: "Binocular cue: Convergence", cn: "双眼线索：聚合", en_def: "The extent to which the eyes converge inward when looking at an object.", cn_def: "看物体时眼睛向内聚合的程度。", hint: "‘对眼儿’。物体离你越近，你的两眼就得越往中间考，大脑以此判断距离。" },
                { term: "Monocular cue: relative clarity", cn: "单眼线索：相对清晰度", en_def: "Hazy objects are farther away than sharp, clear objects.", cn_def: "模糊的物体比清晰的物体看起来更远。", hint: "‘远方的朦胧’。远山总是雾蒙蒙的，近处的树叶却脉络清晰。" },
                { term: "Monocular cue: relative size", cn: "单眼线索：相对大小", en_def: "If two objects are similar in size, the one that casts a smaller retinal image is farther away.", cn_def: "如果两个物体大小相似，成像较小的那个看起来更远。", hint: "‘近大远小’。远处的大巴车在视网膜上可能还没你手指大。" },
                { term: "Monocular cue: texture gradient", cn: "单眼线索：纹理梯度", en_def: "A gradual change from a coarse, distinct texture to a fine, indistinct texture signals increasing distance.", cn_def: "从粗糙清晰的纹理到细密模糊纹理的渐变预示着距离增加。", hint: "‘近处看砖，远处看墙’。脚底下的石子颗颗分明，远处的石子路就像一条色带。" },
                { term: "Monocular cue: interposition", cn: "单眼线索：遮挡/重叠", en_def: "If one object partially blocks our view of another, we perceive it as closer.", cn_def: "如果一个物体挡住了另一个，我们认为挡人的那个更近。", hint: "‘他在我前面’。桌子挡住了椅子的一角，说明桌子离我更近。" },
                { term: "Perceptual constancies", cn: "知觉恒常性", en_def: "Perceiving objects as unchanging even as illumination and retinal images change.", cn_def: "即使光照或视网膜成像改变，仍认为物体属性保持不变。", hint: "‘属性不变’。开门时门的形状从长方形变成了梯形，但你仍然知道它是长方形。" },
                { term: "Apparent movement", cn: "似动现象", en_def: "An optical illusion of motion produced by a series of still images.", cn_def: "由一系列静止图像产生的运动错觉。", hint: "‘霓虹闪烁’。路边亮起的灯泡依次闪烁，看起来像是有光在跑。" },

                // Topic 2.2: Thinking, Problem-Solving, Judgments, and Decision Making
                { term: "Concepts", cn: "概念", en_def: "A mental grouping of similar objects, events, ideas, or people.", cn_def: "对相似物体、事件、想法或人的心理分组。", hint: "‘精神文件夹’。‘椅子’这个概念包含了各种形状的凳子。" },
                { term: "Prototypes", cn: "原型", en_def: "A mental image or best example of a category.", cn_def: "某一类别的典型代表或最佳例子。", hint: "‘形象代言人’。提到鸟，你脑子里先浮现的是麻雀（原型），而不是企鹅。" },
                { term: "Assimilation", cn: "同化", en_def: "Interpreting our new experiences in terms of our existing schemas.", cn_def: "根据现有图式解释新经验的过程。", hint: "‘以此类推’。小孩见过狗，见到小羊也叫‘狗’（把它塞进已有的文件夹）。" },
                { term: "Accommodation", cn: "顺应", en_def: "Adapting our current understandings to incorporate new information.", cn_def: "调整现有理解以纳入新信息的过程。", hint: "‘更新系统’。小孩发现羊不叫汪汪，于是建立了一个新的‘羊’文件夹。" },
                { term: "Algorithm", cn: "算法", en_def: "A methodical, logical rule or procedure that guarantees solving a particular problem.", cn_def: "保证能得到解决方案的、按部就班的程序。", hint: "‘地毯式搜索’。为了找钥匙翻遍每一寸地板，慢但稳。" },
                { term: "Heuristics", cn: "启发法", en_def: "A simple thinking strategy that often allows us to make judgments and solve problems efficiently.", cn_def: "一种简单的、通常能高效解决问题但未必准确的思维策略。", hint: "‘经验法则’。进超市想买牛奶，你直接去冷藏柜而不是全场扫货。" },
                { term: "Representativeness heuristic", cn: "代表性启发法", en_def: "Judging the likelihood of things in terms of how well they seem to represent, or match, particular prototypes.", cn_def: "根据某事物与特定原型的匹配程度来判断其概率。", hint: "‘以貌取人’。看一个人戴眼镜、爱看书，就觉得他是教授而不是农民（由于他更符合教授的原型）。" },
                { term: "Availability heuristic", cn: "易得性启发法", en_def: "Estimating the likelihood of events based on their availability in memory.", cn_def: "根据记忆中相关例子的易得程度来估算事件发生的频率。", hint: "‘印象太深刻’。因为看过坠机新闻，就觉得坐飞机比开车更危险（其实开车事故率更高）。" },
                { term: "Mental set", cn: "心向/思维定势", en_def: "A tendency to approach a problem in one particular way, often a way that has been successful in the past.", cn_def: "倾向于用以往成功过的方法来解决问题。", hint: "‘老套路’。以前电脑坏了重启就好，现在死机了你还是只想重启。" },
                { term: "Priming", cn: "启动效应", en_def: "The activation, often unconsciously, of certain associations, thus predisposing one's perception, memory, or response.", cn_def: "在无意识中激活某些联想，从而影响后续的感知或反应。", hint: "‘潜意识轰炸’。刚看过红色的词，再问你水果名，你更可能说‘苹果’。" },
                { term: "Framing", cn: "框架效应", en_def: "The way an issue is posed; how an issue is framed can significantly affect decisions and judgments.", cn_def: "问题的呈现方式；不同的描述方式会影响决策。", hint: "‘话术的力量’。90%的存活率听起来比10%的死亡率要诱人得多。" },
                { term: "Gambler's fallacy", cn: "赌徒谬误", en_def: "The mistaken belief that, if something happens more frequently than normal during a given period, it will happen less frequently in the future.", cn_def: "错误地认为，如果某事发生频率高于正常值，未来发生的概率就会降低。", hint: "‘风水轮流转’。连开了10次正面，你觉得下次一定是反面，其实概率还是50%。" },
                { term: "Sunk-cost fallacy", cn: "沉没成本谬误", en_def: "Continuing a behavior or endeavor as a result of previously invested resources (time, money or effort).", cn_def: "因为已经投入了资源而坚持做一件已经划不来的事。", hint: "‘来都来了’。电影超级烂，但因为买了票，你还是坚持看完了。" },
                { term: "Executive function", cn: "执行功能", en_def: "Set of cognitive processes that are necessary for the cognitive control of behavior.", cn_def: "控制行为所需的一系列高级认知过程。", hint: "大脑的‘指挥塔’。负责计划、决策、抗拒诱惑和切换任务。" },
                { term: "Divergent thinking", cn: "发散性思维", en_def: "Expands the number of possible problem solutions; creative thinking that divulges in different directions.", cn_def: "从一个点出发产生多种可能的解决方案，与创造力相关。", hint: "‘头脑风暴’。回形针除了夹纸还能干什么？想出越多答案说明发散性越强。" },
                { term: "Convergent thinking", cn: "聚合性思维", en_def: "Narrows the available problem solutions to determine the single best solution.", cn_def: "缩小范围以寻找唯一的最佳解决方案。", hint: "‘标准化考试’。四个选项里选出唯一的正确答案。" },
                { term: "Functional fixedness", cn: "功能固着", en_def: "The tendency to think of things only in terms of their usual functions.", cn_def: "倾向于只看到物体的常规功能。", hint: "‘死脑筋’。找锤子找不到，却没想过手里沉甸甸的扳手也能砸钉子。" },

                // Topic 2.3: Introduction to Memory
                { term: "Explicit memory", cn: "外显记忆", en_def: "Memory of facts and experiences that one can consciously know and 'declare'.", cn_def: "有意识地提取出来的关于事实和经历的记忆。", hint: "‘能说出来的’。比如你第一次约会的地点，或者中国的首都是北京。" },
                { term: "Episodic memory", cn: "情境记忆", en_def: "The collection of past personal experiences that occurred at a particular time and place.", cn_def: "对发生在特定时间和地点的个人经历的记忆。", hint: "‘人生连续剧’。记得你十六岁生日那天吃了什么蛋糕。" },
                { term: "Semantic memory", cn: "语义记忆", en_def: "Network of associated facts and concepts that make up our general knowledge of the world.", cn_def: "有关世界的通用知识、事实和概念的记忆。", hint: "‘精神百科全书’。知道企鹅是鸟类，但不必记得是在哪儿学到这个知识的。" },
                { term: "Implicit memory", cn: "内隐记忆", en_def: "Retention independent of conscious recollection.", cn_def: "无需意识参与即可保留和提取的程序性记忆。", hint: "‘手感’。骑自行车、盲打键盘。只要一上手，肌肉自己就知道该怎么动。" },
                { term: "Procedural memory", cn: "程序性记忆", en_def: "The gradual acquisition of skills as a result of practice, or 'knowing how' to do things.", cn_def: "通过练习获得的技能记忆，即‘知道如何做’。", hint: "‘身体的记忆’。游泳、系鞋带。你不需要每一步都停下来想。" },
                { term: "Prospective memory", cn: "前瞻性记忆", en_def: "Remembering to do something in the future.", cn_def: "记得在未来某个时间去做某事。", hint: "‘提醒事项’。出门前记得下午三点要去取包裹。" },
                { term: "Long-term potentiation (LTP)", cn: "长时程增强", en_def: "An increase in a synapse's firing potential after brief, rapid stimulation.", cn_def: "突触传递效率持久增加的现象。", hint: "‘熟能生巧’的神经基础。这是记忆的‘物理刻痕’。" },
                { term: "Working memory", cn: "工作记忆", en_def: "A newer understanding of short-term memory that focuses on conscious, active processing.", cn_def: "对短期存储中信息进行主动处理和维持的过程。", hint: "大脑的‘桌面’。你正在口算时存放中间数字的地方。" },
                { term: "Central executive", cn: "中央执行系统", en_def: "Part of Alan Baddeley's model of working memory that directs attention and processing.", cn_def: "工作记忆模型中负责指挥注意力和处理的部分。", hint: "工作记忆的‘总管’。决定把注意力分配给听到的声音还是看到的文字。" },
                { term: "Phonological loop", cn: "语音环路", en_def: "The part of working memory that holds and processes verbal and auditory information.", cn_def: "工作记忆中处理语言和听觉信息的部分。", hint: "‘精神复读机’。为了记住电话号码，你在心里不停地默读。" },
                { term: "Visuospatial sketchpad", cn: "视空间写字板", en_def: "The part of working memory that holds and processes visual and spatial information.", cn_def: "工作记忆中处理视觉和空间信息的部分。", hint: "‘精神草稿纸’。在脑子里想象一下你家客厅的布局。" },
                { term: "Multi-store memory model", cn: "多重存储记忆模型", en_def: "Model consisting of three stores: sensory, short-term, and long-term.", cn_def: "由感觉、短期和长期三种存储组成的模式。", hint: "Atkinson-Shiffrin模型。信息像过三道岗哨才能成为永久记忆。" },
                { term: "Sensory memory", cn: "感觉记忆", en_def: "The immediate, very brief recording of sensory information.", cn_def: "感官信息的瞬时记录。", hint: "‘余光/余音’。刚关掉灯，眼前还有个残影。" },
                { term: "Iconic memory", cn: "图像记忆", en_def: "A momentary sensory memory of visual stimuli.", cn_def: "视觉刺激的瞬时感觉记忆。", hint: "‘视觉照片’。持续不到一秒钟的视觉残留。" },
                { term: "Echoic memory", cn: "声像记忆", en_def: "A momentary sensory memory of auditory stimuli.", cn_def: "听觉刺激的瞬时感觉记忆。", hint: "‘回声’。如果你走神了，老师问你‘我刚才说什么’，你脑子里还能捕捉到最后几个词的回响。" },
                { term: "Short-term memory", cn: "短期记忆", en_def: "Activated memory that holds a few items briefly.", cn_def: "短暂保存少量信息的激活记忆。", hint: "‘7±2规律’。一般人也就只能记住7个左右的无关数字。" },
                { term: "Long-term memory", cn: "长期记忆", en_def: "The relatively permanent and limitless storehouse of the memory system.", cn_def: "相对永久且无限的记忆仓库。", hint: "‘终极硬盘’。存了一辈子的技能和故事。" },
                { term: "Automatic processing", cn: "自动化加工", en_def: "Unconscious encoding of incidental information.", cn_def: "对附带信息的无意识编码。", hint: "‘不费脑子’。你不需要刻意记，也知道今天下午在哪儿见过你的老师。" },
                { term: "Effortful processing", cn: "精细加工/费力加工", en_def: "Encoding that requires attention and conscious effort.", cn_def: "需要注意和有意识努力的编码过程。", hint: "‘死记硬背’。为了考试背公式，必须得全身贯注。" },
                { term: "Encoding", cn: "编码", en_def: "The processing of information into the memory system.", cn_def: "将信息处理并存入记忆系统的过程。", hint: "‘输入电脑’。把现实中的光影声带转换成脑子能懂的代码。" },
                { term: "Storage", cn: "存储", en_def: "The retention of encoded information over time.", cn_def: "随时间保留编码信息的过程。", hint: "‘保存文件’。确保存进去的东西没被删掉。" },
                { term: "Retrieval", cn: "提取", en_def: "The process of getting information out of memory storage.", cn_def: "从记忆存储中取出信息的过程。", hint: "‘打开文件’。考试时把背过的知识从脑海里调出来。" },
                { term: "Shallow processing", cn: "浅层加工", en_def: "Encoding on a basic level based on the structure or appearance of words.", cn_def: "基于单词结构或外观的基本编码。", hint: "‘看个热闹’。只记得这个词是大写的，但不知道啥意思。" },
                { term: "Structural processing", cn: "结构加工", en_def: "Encoding based on the physical structure of a stimulus.", cn_def: "基于刺激物理结构的编码。", hint: "浅层加工的一种。比如：‘这个词是六个字母组成的吗？’" },
                { term: "Phonemic processing", cn: "音韵加工", en_def: "Encoding based on the sound of words.", cn_def: "基于单词发音的编码。", hint: "中层加工。比如：‘这个词和“猫”押韵吗？’" },
                { term: "Semantic processing", cn: "语义加工", en_def: "Encoding based on the meaning of words.", cn_def: "基于单词含义的编码。", hint: "深层加工。只有理解了意思，才能记的最牢。" },

                // Topic 2.4: Encoding Memories
                { term: "Mnemonic devices", cn: "助记术", en_def: "Memory aids, especially those techniques that use vivid imagery and organizational devices.", cn_def: "记忆辅助手段，特别是使用生动图像和组织策略的技术。", hint: "‘背诵口诀’。比如把一长串数字编成一个有趣的故事。" },
                { term: "Method of loci", cn: "地点法/记忆宫殿", en_def: "A strategy of memory enhancement which uses visualizations of familiar spatial environments in order to enhance the recall of information.", cn_def: "一种通过在脑海中走过熟悉空间并将信息‘放置’在特定位置来辅助记忆的方法。", hint: "‘记忆宫殿’。想象你走过自家客厅，电视机上放着你要背的第一个单词。" },
                { term: "Chunking", cn: "组块化", en_def: "Organizing items into familiar, manageable units; often occurs automatically.", cn_def: "将项目组织成熟悉的、可管理的单元。", hint: "‘分段记忆’。记电话号码时138-xxxx-xxxx比一大串数字好记多了。" },
                { term: "Categories", cn: "类别", en_def: "Mental groupings of similar objects, events, ideas, or people.", cn_def: "对相似物体、事件、想法或人的心理分组。", hint: "‘物以类聚’。把名词按动植物分类以便记忆。" },
                { term: "Hierarchies", cn: "层级结构", en_def: "Complex information broken down into broad concepts and further subdivided into categories and subcategories.", cn_def: "将复杂信息分解为宽泛概念并进一步细分为类别和子类。", hint: "‘组织架构图’。从大门类到小细节，层层递进。" },
                { term: "Spacing effect", cn: "间歇效应", en_def: "The tendency for distributed study or practice to yield better long-term retention.", cn_def: "分散学习比集中练习能产生更好的长期记忆保留。", hint: "‘细水长流’。每天学半小时，效果远好于考前突击10小时。" },
                { term: "Massed practice", cn: "集中练习", en_def: "Cramming information all at once.", cn_def: "在短时间内大量塞入信息，即临阵磨枪。", hint: "‘考前突击’。虽然能应付明早的考试，但考完由于忘得极快。" },
                { term: "Distributed practice", cn: "分散练习", en_def: "Spreading out study over long periods of time.", cn_def: "将学习任务分摊到较长的一段时间内。", hint: "‘拉长战线’。是间歇效应的实践方式，能让记忆更稳固。" },
                { term: "Serial position effect", cn: "序列位置效应", en_def: "Tendency to recall best the last and first items in a list.", cn_def: "倾向于最好地回忆起列表开头和结尾的项目。", hint: "‘两头尖尖’。背单词书，永远只记得第一个（Abandon）和最后一个。" },
                { term: "Primacy effect", cn: "首因效应", en_def: "Better recall for items at the beginning of a list.", cn_def: "对列表开头项的记忆力更好。", hint: "‘第一印象’。序列位置效应的前半部分。因为开头的信息有更多时间进行进修性复述。" },
                { term: "Recency effect", cn: "近因效应", en_def: "Better recall for items at the end of a list.", cn_def: "对列表末尾项的记忆力更好。", hint: "‘记忆犹新’。序列位置效应的后半部分。因为它们还在你的短期记忆里热乎着。" },

                // Topic 2.5: Storing Memories
                { term: "Maintenance rehearsal", cn: "维持性复述", en_def: "Directly repeating information in order to maintain it in short-term memory.", cn_def: "为了将信息留在短期记忆中而不断重复的过程。", hint: "‘死记硬背’。单纯地在嘴里念叨‘123, 123...’，一旦停下可能就忘了。" },
                { term: "Elaborative rehearsal", cn: "精细复述", en_def: "Linking new information to things that are already known.", cn_def: "将新信息与已知信息建立联系的过程。", hint: "‘联想记忆’。把新学的概念和你的生活经历结合起来，记得最深。" },
                { term: "Highly superior autobiographical memory", cn: "超强自传体记忆", en_def: "An exceptional ability to remember nearly every event from one's life.", cn_def: "能够记住生命中几乎每一个事件的非凡能力。", hint: "‘行走的日记本’。这种人能清楚记得十年前的今天天气如何、吃了什么。" },
                { term: "Retrograde amnesia", cn: "逆行性遗忘", en_def: "The loss of past memories.", cn_def: "丧失对过去发生事件的记忆。", hint: "‘忘了过去’。电影里的失忆主角通常是这种，不认得家人，不记得自己是谁。" },
                { term: "Anterograde amnesia", cn: "顺行性遗忘", en_def: "The inability to form new memories.", cn_def: "无法形成新的记忆。", hint: "‘没有未来’。由于海马体受损，你永远活在当下，记不住五分钟前见过谁。" },
                { term: "Alzheimer's disease", cn: "阿尔茨海默病", en_def: "A progressive disease that destroys memory and other important mental functions.", cn_def: "一种逐渐破坏记忆和其他重要心理功能的进展性疾病。", hint: "‘大脑的橡皮擦’。从遗忘近期小事开始，最终波及人格和生命功能。" },
                { term: "Infantile amnesia", cn: "婴儿期遗忘", en_def: "The inability of adults to retrieve episodic memories before the age of 2–4 years.", cn_def: "成年人无法回忆起2-4岁以前经历的现象。", hint: "‘断层的童年’。因为那时候大脑海马体还没发育好，也没学会用语言编码。" },

                // Topic 2.6: Retrieving Memories
                { term: "Recall", cn: "回忆", en_def: "Retrieving information that is not currently in your conscious awareness but that was learned at an earlier time.", cn_def: "提取当前不在意识中但以前学过的信息。", hint: "‘简答题’。没有任何提示，直接在脑子里搜寻答案。" },
                { term: "Recognition", cn: "再认", en_def: "Identifying items previously learned.", cn_def: "识别出以前学过的项目。", hint: "‘选择题’。你不需要背出答案，只要在选项里把它挑出来就行。" },
                { term: "Context-dependent memory", cn: "情境依赖性记忆", en_def: "The improved recall of specific episodes or information when the context present at encoding and retrieval are the same.", cn_def: "当提取环境与编码环境一致时，记忆效果更好的现象。", hint: "‘回到现场’。在水下学的单词，在水下考效果比在岸上考好。" },
                { term: "State-dependent memory", cn: "状态依赖性记忆", en_def: "Information learned in one physical or mental state is best recalled when in that same state.", cn_def: "在某种生理或心理状态下学到的信息，在相同状态下最容易提取。", hint: "‘情绪共鸣’。你难过的时候，总是想起以前那些伤心的往事。" },
                { term: "Testing effect", cn: "测试效应", en_def: "Enhanced memory after retrieving, rather than simply rereading, information.", cn_def: "提取信息（考试）比单纯重复阅读产生的记忆效果更好。", hint: "‘以考代练’。与其多看十遍书，不如做一套卷子。" },
                { term: "Metacognition", cn: "元认知", en_def: "Thinking about thinking; awareness and understanding of one's own thought processes.", cn_def: "对认知的认知；对自己思维过程的觉察和理解。", hint: "‘上帝视角’。你知道自己背这篇课文没背熟，这就是在运用元认知。" },

                // Topic 2.7: Forgetting and other Memory Challenges
                { term: "Forgetting curve", cn: "遗忘曲线", en_def: "Hypothesis that declines in memory retention in time.", cn_def: "描述记忆随时间推移而下降的假设。", hint: "艾宾浩斯曲线。刚学完时忘得最快，后来速度会变慢并趋于稳定。" },
                { term: "Encoding failure", cn: "编码失败", en_def: "The brain's occasional failure to create a memory link.", cn_def: "大脑偶尔未能建立记忆链接的现象。", hint: "‘压根儿没存进去’。你天天见一元硬币，但让你画出上面的细节你画不出，因为你从来没有仔细编码过这些细节。" },
                { term: "Proactive interference", cn: "前摄干扰", en_def: "The forward-acting disruptive effect of prior learning on the recall of new information.", cn_def: "旧的信息干扰了对新信息的提取。", hint: "‘换了新手机号，开口背出来的还是旧的’。" },
                { term: "Retroactive interference", cn: "倒摄干扰", en_def: "The backward-acting disruptive effect of new learning on the recall of old information.", cn_def: "新的学习干扰了对旧信息的提取。", hint: "‘刚学了法语，连最简单的英语单词怎么拼都忘了’。" },
                { term: "Tip-of-the-tongue phenomenon", cn: "话到嘴边现象", en_def: "Failing to retrieve a word from memory, combined with partial recall and the feeling that retrieval is imminent.", cn_def: "未能从记忆中提取出某个词，但感觉马上就能想起来。", hint: "‘舌尖现象’。知道那个词大概长什么样，但就是吐不出来。" },
                { term: "Repression", cn: "压抑", en_def: "The basic defense mechanism that banishes from consciousness anxiety-arousing thoughts, feelings, and memories.", cn_def: "防止引起焦虑的想法和记忆进入意识的防御机制。", hint: "‘选择性遗忘’。弗洛伊德认为，我们会为了保护自己而故意‘忘记’极度痛苦的创伤。" },
                { term: "Misinformation effect", cn: "误导信息效应", en_def: "Incorporating misleading information into one's memory of an event.", cn_def: "将误导性信息纳入对某一事件记忆的现象。", hint: "‘被带偏了’。有人问你‘撞碎的玻璃在哪儿？’，即使现场根本没碎玻璃，你也会在几周后‘记起’有碎玻璃。" },
                { term: "Source amnesia", cn: "来源遗忘", en_def: "Attributing to the wrong source an event we have experienced, heard about, read about, or imagined.", cn_def: "将经历过或听说过的事情记错了来源。", hint: "‘似曾相识’。你以为是自己亲身经历的，其实可能只是小时候看过的一个电影片段。" },
                { term: "Constructive memory", cn: "建构性记忆", en_def: "Memory that has been simplified, enriched, or distorted, depending on an individual's experiences and attitudes.", cn_def: "根据个人经验和态度而被简化、丰富或扭曲的记忆。", hint: "‘记忆是加工出来的’。我们不是在播放录像带，而是在根据线索重新拼凑故事。" },
                { term: "Memory consolidation", cn: "记忆巩固", en_def: "The neural storage of a long-term memory.", cn_def: "将短期记忆转化为长期记忆的神经过程。", hint: "‘固化’。睡眠在这个过程中至关重要，它能帮我们将白天的经历‘刻’进脑子里。" },
                { term: "Imagination inflation", cn: "想象膨胀", en_def: "The finding that imagining an event which never happened can increase confidence that it actually occurred.", cn_def: "想象从未发生的事件会增加认为其真实发生过的信心的现象。", hint: "‘想多了就成真了’。你越是详细地想象自己小时候被蛇咬过，你就越可能真的相信这事发生过。" },

                // Topic 2.8: Intelligence and Achievement
                { term: "General intelligence g", cn: "一般智力g因素", en_def: "A general intelligence factor that, according to Spearman and others, underlies specific mental abilities.", cn_def: "斯皮尔曼认为的潜伏在特定智力能力之下的基本智力因素。", hint: "‘智力的内核’。如果你数学好，往往语文也不差，就是因为g因素在起作用。" },
                { term: "Intelligence quotient IQ", cn: "智商IQ", en_def: "Defined originally as the ratio of mental age (ma) to chronological age (ca) multiplied by 100.", cn_def: "最初定义为心理年龄与生理年龄之比再乘以100。", hint: "10岁孩子有12岁的心智，他的IQ就是120。" },
                { term: "Psychometrics", cn: "心理测量学", en_def: "The scientific study of the measurement of human abilities, attitudes, and traits.", cn_def: "研究人类能力、态度和特质测量的科学学科。", hint: "‘心理秤’。设计各种量表和测试来量化看不见摸不着的心理品质。" },
                { term: "Standardized", cn: "标准化", en_def: "Defining uniform testing procedures and meaningful scores by comparison with the performance of a pretested group.", cn_def: "通过与预试组的表现进行比较来定义统一的测试程序和有意义的分数。", hint: "‘统一标尺’。大家都考同一张卷子，在同一个评分标准下排名。" },
                { term: "Validity", cn: "效度", en_def: "The extent to which a test measures or predicts what it is supposed to.", cn_def: "测试测量或预测其预定内容的准确程度。", hint: "‘测得准不准’。你要测智力，卷子里全是数学题，那效度就不高。" },
                { term: "Construct validity", cn: "结构效度", en_def: "The degree to which a test measures what it claims, or purports, to be measuring.", cn_def: "测试在多大程度上真正测量到了它声称要测量的抽象概念。", hint: "‘概念对不对位’。你的测试真的测到‘焦虑’了吗，还是只是测到了‘心跳快’？" },
                { term: "Predictive validity", cn: "预测效度", en_def: "The success with which a test predicts the behavior it is designed to predict.", cn_def: "测试成功预测其设计要预测的行为的程度。", hint: "‘预言的准度’。高考分数如果能准确预测大学成绩，那它就有很高的预测效度。" },
                { term: "Reliability", cn: "信度", en_def: "The extent to which a test yields consistent results.", cn_def: "测试产生一致结果的程度。", hint: "‘稳定性’。你今天测IQ是120，明天测变80了，那这测试就完全不可信。" },
                { term: "Test-retest reliability", cn: "重测信度", en_def: "The consistency of scores when the same test is administered to the same people at different times.", cn_def: "同一个人两次参加同一个测试结果是否一致。", hint: "‘前后一致’。证明测试结果不是随缘出的。" },
                { term: "Split-half reliability", cn: "分半信度", en_def: "The degree to which all components of an assessment contribute equally to its measurement.", cn_def: "测试的两半部分（如奇数题和偶数题）结果是否一致。", hint: "‘内部一致’。同一个卷子，如果是这两半得分差太多，说明有些题目可能偏了。" },
                { term: "Stereotype threat", cn: "刻板印象威胁", en_def: "A self-confirming concern that one will be evaluated based on a negative stereotype.", cn_def: "担心自己会被基于负面刻板印象来评价的自我确认式焦虑。", hint: "‘顾虑重重’。如果考试前有人强调‘女性数学不好’，参加考试的女性可能因为紧张而发挥失常。" },
                { term: "Stereotype lift", cn: "刻板印象提升", en_def: "A performance boost that occurs when people are exposed to negative stereotypes about another group.", cn_def: "当人们接触到关于其他团体的负面刻板印象时，自身表现提升的现象。", hint: "‘对手被贬低后的心理优势’。如果你听说‘外校学生很弱’，你可能在比赛中表现得更自信。" },
                { term: "Flynn effect", cn: "弗林效应", en_def: "The worldwide phenomenon that shows intelligence test performance has been increasing over the years.", cn_def: "世界范围内智商分数随年代推移而逐年提高的现象。", hint: "‘人类越来越聪明’。现在的孩子平均智商比一百年前高得多（可能是因为教育和营养好了）。" },
                { term: "Achievement tests", cn: "成就测验", en_def: "Tests designed to assess what a person has learned.", cn_def: "旨在评估一个人已经学到了什么的测试。", hint: "‘期末考’。考查你对这学期知识的掌握情况。" },
                { term: "Aptitude tests", cn: "能力倾向测验", en_def: "Tests designed to predict a person's future performance; aptitude is the capacity to learn.", cn_def: "旨在预测一个人未来表现的测试；考查学习潜能。", hint: "‘天赋测试’。看看你是否具有学习成为飞行员的潜质。" },
                { term: "Fixed mindset", cn: "固定型思维", en_def: "The belief that basic qualities, like intelligence or talent, are fixed traits.", cn_def: "认为智力等基本素质是天生固定、无法改变的倾向。", hint: "‘天注定’。遇到挫折会觉得‘我不行，我没这个命’。" },
                { term: "Growth mindset", cn: "成长型思维", en_def: "The belief that basic qualities can be developed through dedication and hard work.", cn_def: "认为通过努力和坚持可以提升基本素质的倾向。", hint: "‘潜力无限’。觉得失败只是学习的机会，我还没掌握，以后会好的。" },
                { term: "Mental age", cn: "心理年龄", en_def: "A measure of intelligence test performance devised by Binet; the chronological age that most typically corresponds to a given level of performance.", cn_def: "比奈提出的智力衡量标准；特定表现水平所对应的典型年龄。", hint: "一个5岁小孩能做对8岁孩子平均水平的题，他的心理年龄就是8。" },
            ],
            "Unit 3: Learning & Development": [
                // --- LEARNING (Topics 3.7 - 3.9) ---
                { term: "Acquisition", cn: "获得", en_def: "The initial stage of learning where a neutral stimulus is paired with an unconditioned stimulus.", cn_def: "学习的初始阶段，将中性刺激与非条件刺激联系起来。", hint: "狗狗第一次听到铃声就有肉吃的那个转折点。" },
                { term: "Unconditioned stimulus (UCS)", cn: "非条件刺激", en_def: "A stimulus that naturally triggers a response.", cn_def: "自然诱发反应的刺激。", hint: "看到红烧肉自然流口水。肉就是UCS。" },
                { term: "Unconditioned response (UCR)", cn: "非条件反应", en_def: "An unlearned, naturally occurring response.", cn_def: "自然发生的本能反应。", hint: "看到肉流口水，流口水就是UCR。" },
                { term: "Conditioned stimulus (CS)", cn: "条件刺激", en_def: "A previously neutral stimulus that, after association with an UCS, comes to trigger a conditioned response.", cn_def: "以前中性，现在能诱发反应的刺激。", hint: "现在的铃声。" },
                { term: "Conditioned response (CR)", cn: "条件反应", en_def: "A learned response to a previously neutral stimulus.", cn_def: "对以前中性的刺激产生的学习反应。", hint: "现在听到铃声流口水。" },
                { term: "Extinction", cn: "消退", en_def: "The diminishing of a conditioned response.", cn_def: "条件反应逐渐减弱。", hint: "铃声响了多次都没肉吃，狗就不流口水了。" },
                { term: "Spontaneous recovery", cn: "自发恢复", en_def: "The reappearance of a weakened conditioned response after a rest period.", cn_def: "休息一段时间后，消退的反应突然再次出现。", hint: "消失的口水又回来了。" },
                { term: "Discrimination (Classical)", cn: "辨别（经典条件反射）", en_def: "The learned ability to distinguish between a conditioned stimulus and stimuli that do not signal an unconditioned stimulus.", cn_def: "区分CS和其他无关刺激的能力。", hint: "区分小铃铛和大铜钟的声音。" },
                { term: "Generalization (Classical)", cn: "泛化（经典条件反射）", en_def: "The tendency for stimuli similar to the conditioned stimulus to elicit similar responses.", cn_def: "对类似CS的刺激也产生类似的反应。", hint: "对所有圆形的物体都感到害怕。" },
                { term: "Higher-order conditioning", cn: "高阶条件反射", en_def: "A procedure in which the conditioned stimulus is paired with a new neutral stimulus, creating a second (often weaker) conditioned stimulus.", cn_def: "把已有的CS和新的中性刺激联系起来。", hint: "铃声之后亮个灯，灯也能让狗流口水。" },
                { term: "Taste aversion", cn: "味觉厌恶", en_def: "A conditioned dislike for a particular food.", cn_def: "对某种食物产生的条件性厌恶。", hint: "吃完海鲜拉肚子，以后闻到海鲜味就恶心。" },
                { term: "One-trial conditioning", cn: "一次性条件反射", en_def: "A form of learning that occurs after only a single pairing of a stimulus and a response.", cn_def: "只需一次尝试就学会的联想。", hint: "比如剧烈的食物中毒。" },
                { term: "Biological preparedness", cn: "生物性预知", en_def: "A propensity for learning particular associations.", cn_def: "学习某些联想的天然倾向。", hint: "人类天生更容易害怕蛇，而不是害怕电源插座。" },
                { term: "Habituation", cn: "习惯化", en_def: "Decreasing responsiveness with repeated stimulation.", cn_def: "对重复刺激反应减弱。", hint: "刚穿衣服觉得紧，过一会儿就没感觉了。" },
                { term: "Law of Effect", cn: "效果律", en_def: "Thorndike's principle that behaviors followed by favorable consequences become more likely.", cn_def: "产生好结果的行为更有可能再次发生。", hint: "桑代克的猫。做对了就有奖，下次还会做。" },
                { term: "Positive reinforcement", cn: "正强化", en_def: "Increasing behaviors by presenting positive reinforcers.", cn_def: "通过给予奖励来增加某种行为出现的频率。", hint: "考100分给零花钱。" },
                { term: "Negative reinforcement", cn: "负强化", en_def: "Increasing behaviors by stopping or reducing negative stimuli.", cn_def: "通过移除或减少负面刺激（如免除家务）来增加行为。", hint: "写完作业就不用洗碗了。" },
                { term: "Positive punishment", cn: "正惩罚", en_def: "Administering an aversive stimulus to decrease behavior.", cn_def: "通过施加厌恶刺激来减少行为。", hint: "闯红灯扣分。" },
                { term: "Negative punishment", cn: "负惩罚", en_def: "Withdrawing a rewarding stimulus to decrease behavior.", cn_def: "通过移除愉快刺激来减少行为。", hint: "玩电脑太晚，没收手机。" },
                { term: "Primary reinforcer", cn: "初级强化物", en_def: "An innately reinforcing stimulus.", cn_def: "天生就有强化作用的刺激。", hint: "食物、水、舒服的温度。" },
                { term: "Secondary reinforcer", cn: "次级强化物", en_def: "A stimulus that gains its power through association with a primary reinforcer.", cn_def: "通过与初级强化物联系而获得权力的刺激。", hint: "钱。钱本身不能吃，但能换吃的。" },
                { term: "Discrimination (Operant)", cn: "辨别（操作性）", en_def: "Learning that certain responses, but not others, will be reinforced.", cn_def: "学习只有在特定情景下才有奖励。", hint: "只在妈妈高兴时要礼物。" },
                { term: "Generalization (Operant)", cn: "泛化（操作性）", en_def: "When a behavior reinforced in one situation occurs in other similar situations.", cn_def: "在类似情景下也做同样的行为。", hint: "在家刷牙得表扬，去奶奶家也刷牙。" },
                { term: "Shaping", cn: "塑造", en_def: "An operant conditioning procedure in which reinforcers guide behavior toward closer and closer approximations of the desired behavior.", cn_def: "逐步引导行为达到目标的过程。", hint: "训海豚钻圈。先让它靠近圈，再让它浮出水面，最后钻过去。" },
                { term: "Successive approximations", cn: "连续接近", en_def: "Rewards for behaviors that increasingly resemble the goal behavior.", cn_def: "对越来越接近目标的行为给予奖励。", hint: "塑造的具体每一步。" },
                { term: "Instinctual drift", cn: "本能漂移", en_def: "The tendency of animals to revert to instinctive behaviors.", cn_def: "动物回到本能行为的倾向。", hint: "浣熊学着投币，结果开始像在水里洗东西一样搓硬币。" },
                { term: "Learned helplessness", cn: "习得性无助", en_def: "The hopelessness and passive resignation an animal or human learns when unable to avoid repeated aversive events.", cn_def: "无法逃脱困难后的绝望和放弃。", hint: "考多少次都不及格，最后干脆不学了。" },
                { term: "Continuous reinforcement", cn: "连续强化", en_def: "Reinforcing the desired response every time it occurs.", cn_def: "每次做对都给奖。", hint: "学习新技能最快，但也最容易消退。" },
                { term: "Partial reinforcement", cn: "部分强化", en_def: "Reinforcing a response only part of the time.", cn_def: "偶尔给奖。", hint: "赌博。不容易消退。" },
                { term: "Fixed interval schedule", cn: "固定时距程序", en_def: "Reinforces a response only after a specified time has elapsed.", cn_def: "定时给奖。", hint: "每季度领一次奖金。到了发钱前几天最积极。" },
                { term: "Variable interval schedule", cn: "变动时距程序", en_def: "Reinforces a response at unpredictable time intervals.", cn_def: "不定时给奖。", hint: "抽查。你不知道老师什么时候来，所以得一直盯着。" },
                { term: "Fixed ratio schedule", cn: "固定比率程序", en_def: "Reinforces a response only after a specified number of responses.", cn_def: "做满一定次数给奖。", hint: "计件工资。完成10件得100块。" },
                { term: "Variable ratio schedule", cn: "变动比率程序", en_def: "Reinforces a response after an unpredictable number of responses.", cn_def: "次数随机。", hint: "老虎机。最具成瘾性。" },
                { term: "Social learning", cn: "社会学习理论", en_def: "Learning by observing others.", cn_def: "通过观察他人来学习。", hint: "班杜拉的波波玩偶实验。大人打玩偶，小孩也跟着打。" },
                { term: "Vicarious conditioning", cn: "替代性条件反射", en_def: "Conditioning of a reflex response or emotion by watching the reaction of another person to a stimulus.", cn_def: "通过观察他人对刺激的反应而产生的条件反射。", hint: "看到朋友吃柠檬酸得龇牙咧嘴，你也分泌口水。" },
                { term: "Prosocial behavior", cn: "亲社会行为", en_def: "Positive, constructive, helpful behavior.", cn_def: "积极助人的行为。", hint: "乐于助人、捐款、模仿英雄行为。" },
                { term: "Antisocial behavior", cn: "反社会行为", en_def: "Negative, destructive, unhelpful behavior.", cn_def: "有害的行为。", hint: "暴力倾向、霸凌模仿。" },
                { term: "Insight learning", cn: "洞察学习", en_def: "A sudden realization of a problem's solution.", cn_def: "突然想到答案。", hint: "顿悟。猩猩够不到香蕉，突然把两根棍子连在一起。" },
                { term: "Latent learning", cn: "潜伏学习", en_def: "Learning that occurs but is not apparent until there is an incentive to demonstrate it.", cn_def: "学到了但没显露，直到有奖励才表现出来。", hint: "托尔曼的迷宫实验。老鼠平时就在乱逛，有了奶酪突然跑得飞快。" },
                { term: "Cognitive map", cn: "认知地图", en_def: "A mental representation of the layout of one's environment.", cn_def: "大脑里的路线图。", hint: "即使闭上眼，你也能在自己家里走到厨房。" },

                // --- DEVELOPMENT (Topics 3.1 - 3.6) ---
